<!--
  Supabase Auth → Email Templates → "Reset Password"
  Subject: Reset your LittleNest password
  Domain already set to littlenestmy.com. Paste as-is into Supabase.
-->
<div style="font-family:'Nunito Sans',-apple-system,Segoe UI,Arial,sans-serif;max-width:480px;margin:0 auto;padding:32px 28px;background:#faf8ff;border-radius:20px;color:#241b3a">
  <div style="text-align:center;margin-bottom:8px">
    <img src="https://littlenestmy.com/icons/icon-192.png" width="64" height="64" alt="LittleNest" style="border-radius:16px"/>
    <h1 style="font-size:22px;color:#7c5cff;margin:18px 0 4px;font-weight:800">Reset your password</h1>
  </div>

  <p style="font-size:16px;line-height:1.6;color:#5b4f72;margin:24px 0 0">
    We got a request to reset your LittleNest password. Tap below to choose a new one.
  </p>

  <div style="text-align:center;margin:28px 0">
    <a href="{{ .ConfirmationURL }}"
       style="background:#7c5cff;color:#ffffff;text-decoration:none;padding:14px 36px;border-radius:999px;font-weight:700;font-size:16px;display:inline-block">
      Set a new password
    </a>
  </div>

  <p style="font-size:13px;line-height:1.5;color:#9b90b3;text-align:center;margin:0">
    Button not working? Copy this link into your browser:<br/>
    <a href="{{ .ConfirmationURL }}" style="color:#7c5cff;word-break:break-all">{{ .ConfirmationURL }}</a>
  </p>

  <hr style="border:none;border-top:1px solid #eee8ff;margin:28px 0 16px"/>
  <p style="font-size:12px;color:#b5acc9;text-align:center;margin:0">
    Didn't ask to reset your password? Ignore this email — your account stays safe.
  </p>
</div>
