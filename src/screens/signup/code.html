<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://esm.sh" crossorigin/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#ffbfa3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/src/utils/pwa-safe-area.css?v=soft-bg-20260615"/>
<link rel="stylesheet" href="/src/utils/theme.css?v=soft-bg-20260615"/>
<link rel="stylesheet" href="/src/utils/auth-polish.css?v=20260630"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Create Account - LittleNest MY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        surface: "#fff8f5",
        "surface-container": "#f4ebe6",
        "surface-container-low": "#fff1ea",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        error: "#ba1a1a"
      },
      fontFamily: { body: ["Nunito Sans", "sans-serif"] }
    }
  }
};
</script>
<style>.soft-shadow{box-shadow:0 18px 45px rgba(131,83,60,.12)} input{font-size:16px}</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="auth-polish bg-surface text-on-surface font-body min-h-screen">
<main class="min-h-screen px-6 py-6 max-w-md mx-auto flex flex-col">
<header class="h-14 flex items-center justify-between gap-3">
<button aria-label="Back to welcome" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary" data-screen-target="auth_welcome" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="auth-brand-chip">
<span class="auth-brand-mark material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1;">crib</span>
<span class="font-extrabold text-primary">LittleNest MY</span>
</div>
</header>
<section class="flex-1 flex flex-col justify-center space-y-5">
<div class="auth-hero-strip rounded-[30px] p-5 flex items-center gap-4">
<div class="auth-icon-tile">
<span class="material-symbols-outlined text-[36px]" style="font-variation-settings:'FILL' 1;">family_restroom</span>
</div>
<div class="space-y-1">
<h1 class="text-3xl font-extrabold text-primary leading-tight">Create your nest</h1>
<p class="text-base leading-6 text-on-surface-variant">Start with a parent account, then add your baby's profile.</p>
</div>
</div>
<form class="auth-glass rounded-[32px] bg-surface-container-lowest p-6 soft-shadow border border-white/70 space-y-4" id="signupForm" novalidate>
<div class="space-y-2">
<label class="font-bold text-sm" for="name">Name</label>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 focus:ring-2 focus:ring-primary" id="name" placeholder="Mama" type="text"/>
</div>
<div class="space-y-2">
<label class="font-bold text-sm" for="email">Email</label>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 focus:ring-2 focus:ring-primary" id="email" inputmode="email" placeholder="mama@example.com" type="email"/>
</div>
<div class="space-y-2">
<label class="font-bold text-sm" for="password">Password</label>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 focus:ring-2 focus:ring-primary" id="password" placeholder="Create a password" type="password"/>
</div>
<div class="space-y-2">
<label class="font-bold text-sm" for="confirmPassword">Confirm Password</label>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 focus:ring-2 focus:ring-primary" id="confirmPassword" placeholder="Repeat password" type="password"/>
</div>
<p class="hidden text-sm text-error" id="signupError" aria-live="polite"></p>
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-extrabold active:scale-[0.98] transition-transform" type="submit">Create Account</button>
</form>
<div class="flex items-center gap-3">
<div class="flex-1 h-px bg-surface-container-high"></div>
<span class="text-xs text-on-surface-variant font-bold">or</span>
<div class="flex-1 h-px bg-surface-container-high"></div>
</div>
<button class="w-full h-14 rounded-full bg-white border border-outline-variant text-on-surface font-extrabold flex items-center justify-center gap-3 active:scale-[0.98] transition-transform hover:bg-surface-container-low" id="googleButton" type="button" aria-label="Continue with Google">
<svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
Continue with Google
</button>
<p class="text-center text-sm text-on-surface-variant">Already have an account? <button class="font-extrabold text-primary" data-screen-target="login" type="button">Log In</button></p>
</section>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { hasAnyBabyProfileRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { getAuthConfigMessage, getPendingInviteToken, clearPendingInviteToken, hasSupabaseConfig, isEmailVerified, isValidEmail, normalizeEmail, rememberPendingVerificationEmail, routeAfterAuth, signupLocalUser, signInWithGoogle } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { loadInvitePreviewRemote } = await import(`${moduleBase}utils/familyInvitesRemote.mjs`);
  const { bindPrototypeActions, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  bindPrototypeActions();
  const error = document.getElementById("signupError");
  const form = document.getElementById("signupForm");
  const submitButton = form.querySelector('button[type="submit"]');

  if (!hasSupabaseConfig()) {
    error.textContent = getAuthConfigMessage();
    error.classList.remove("hidden");
  }

  document.getElementById("googleButton").addEventListener("click", async () => {
    submitButton.disabled = true;
    submitButton.textContent = "Redirecting...";
    error.classList.add("hidden");
    try {
      const redirectTo = `${window.location.origin}${screenUrl("home_dashboard")}`;
      await signInWithGoogle(redirectTo);
    } catch (googleError) {
      error.textContent = googleError.message || "Google sign-in failed. Please try again.";
      error.classList.remove("hidden");
      submitButton.disabled = false;
      submitButton.textContent = "Create Account";
    }
  });

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = normalizeEmail(document.getElementById("email").value);
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    let message = "";
    if (!hasSupabaseConfig()) message = getAuthConfigMessage();
    else if (!name) message = "Add your name to create an account.";
    else if (!isValidEmail(email)) message = "Enter a valid email address.";
    else if (!password.trim()) message = "Add a password to continue.";
    else if (password !== confirmPassword) message = "Passwords need to match.";

    if (message) {
      error.textContent = message;
      error.classList.remove("hidden");
      return;
    }

    submitButton.disabled = true;
    submitButton.textContent = "Creating...";
    error.classList.add("hidden");
    try {
      const result = await signupLocalUser({ name, email, password });
      rememberPendingVerificationEmail(email);
      const verified = result.session && isEmailVerified(result.user || result.session.user);
      if (!verified) {
        // Email confirmation required → hold at the verification screen.
        window.location.href = screenUrl("verify_pending");
        return;
      }
      const pendingInviteToken = getPendingInviteToken();
      if (await hasUsablePendingInvite(pendingInviteToken)) {
        window.location.href = `${screenUrl("accept_invite")}?token=${encodeURIComponent(pendingInviteToken)}`;
        return;
      }
      window.location.href = routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl);
    } catch (authError) {
      error.textContent = authError.message || "Could not create account. If this email already has an account, please log in or reset your password.";
      error.classList.remove("hidden");
      submitButton.disabled = false;
      submitButton.textContent = "Create Account";
    }
  });

  async function hasUsablePendingInvite(token) {
    if (!token) return false;
    try {
      const invite = await loadInvitePreviewRemote(token);
      const status = String(invite?.status || "pending");
      if (!["expired", "revoked", "declined", "accepted"].includes(status)) return true;
    } catch {
      // Stale/broken invite token should not trap normal signup.
    }
    clearPendingInviteToken();
    return false;
  }
</script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
