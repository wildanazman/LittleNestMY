<!DOCTYPE html>

<html class="light" lang="en"><head>
<style>:root {
  --background: #fbf9f4;
  --surface: #fbf9f4;
  --surface-bright: #fbf9f4;
  --surface-dim: #dbdad5;
  --surface-container: #efeee9;
  --surface-container-low: #f5f3ee;
  --surface-container-high: #eae8e3;
  --surface-container-highest: #e4e2de;
  --surface-container-lowest: #ffffff;
  --surface-variant: #e4e2de;
  --primary: #83533c;
  --on-primary: #ffffff;
  --primary-container: #ffbfa3;
  --on-primary-container: #7a4b36;
  --primary-fixed: #ffdbcc;
  --primary-fixed-dim: #f7b89d;
  --on-primary-fixed: #331203;
  --on-primary-fixed-variant: #673c27;
  --secondary: #625e56;
  --on-secondary: #ffffff;
  --secondary-container: #e6dfd5;
  --on-secondary-container: #67625a;
  --secondary-fixed: #e9e1d8;
  --secondary-fixed-dim: #ccc5bc;
  --on-secondary-fixed: #1e1b15;
  --on-secondary-fixed-variant: #4a463f;
  --tertiary: #486646;
  --on-tertiary: #ffffff;
  --tertiary-container: #b5d6af;
  --on-tertiary-container: #415e3f;
  --tertiary-fixed: #caecc4;
  --tertiary-fixed-dim: #aecfa9;
  --on-tertiary-fixed: #052108;

  --error: #ba1a1a;

  --error-container: #ffdad6;

  --outline: #84746d;
  --outline-variant: #d6c2bb;
  --inverse-surface: #30312e;
  --inverse-on-surface: #f2f1ec;
  --inverse-primary: #f7b89d;
  --surface-tint: #83533c;
  --on-surface: #1b1c19;
  --on-surface-variant: #51443e;

<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>

<link rel="stylesheet" href="/src/utils/pwa-safe-area.css?v=soft-bg-20260615"/>

<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Create Baby Profile - LittleNest MY</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #FFFDF8;
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 191, 163, 0.4);
        }
        .radio-tile-active {
            background-color: #ffbfa3 !important;
            color: #7a4b36 !important;
            border-color: #83533c !important;
        }
        /* Custom date picker appearance */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: opacity(0.5);
            cursor: pointer;
        }
        .shadow-soft {
            box-shadow: 0 10px 25px -5px rgba(255, 191, 163, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="min-h-screen text-on-surface">
<!-- Top App Bar -->
<header class="docked full-width top-0 bg-surface dark:bg-surface-dim flex justify-between items-center w-full px-container-padding h-14 sticky z-50">
<div class="flex items-center gap-4">
<button aria-label="Back to home" class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200" id="babyProfileBackButton" type="button">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed-dim">LittleNest MY</h1>
</div>
<button class="w-8 h-8 rounded-full bg-secondary-container overflow-hidden border-2 border-primary-container flex items-center justify-center active:scale-95 transition-transform" data-screen-target="settings" type="button" aria-label="Open settings">
<img alt="Parent profile" class="w-full h-full object-cover hidden" id="topParentPhoto"/>
<span class="font-headline-md text-headline-md text-primary" id="topParentInitials">P</span>
</button>
</header>
<main class="max-w-md mx-auto px-container-padding pt-8 pb-32">
<!-- Content Canvas -->
<div class="space-y-8">
<!-- Header Section -->
<div class="text-center space-y-2">
<h2 class="font-display-lg text-display-lg text-on-surface" id="formTitle">New Arrival</h2>
<p class="font-body-md text-body-md text-on-surface-variant" id="formSubtitle">Let's start your baby's journey of growth and memories.</p>
</div>
<!-- Profile Form -->
<form class="space-y-6" id="babyProfileForm">
<!-- Avatar Upload Section -->
<div class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="w-32 h-32 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden border-4 border-surface shadow-soft transition-transform group-active:scale-95">
<img class="w-full h-full object-cover hidden" data-alt="A soft, heartwarming portrait of a newborn baby wrapped in a light cream-colored organic cotton blanket. The lighting is diffused and golden, creating a serene and angelic mood. The background is a blurred, warm wooden nursery setting, maintaining a professional and clean aesthetic typical of a high-end parenting application." id="babyAvatarPreview" src="/icons/placeholder.svg"/>
<span class="material-symbols-outlined text-4xl text-on-secondary-container" id="avatarPlaceholder">add_a_photo</span>
</div>
<label class="absolute bottom-1 right-1 w-10 h-10 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-lg cursor-pointer hover:scale-105 transition-transform" for="avatarInput">
<span class="material-symbols-outlined">edit</span>
<input accept="image/*" class="hidden" id="avatarInput" type="file"/>
</label>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Upload baby photo</span>
</div>
<!-- Input Fields Group -->
<div class="space-y-4">
<!-- Baby Name -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md ml-2 text-on-surface-variant" for="babyName">Baby Name</label>
<input class="w-full h-14 px-4 rounded-xl border-none bg-[#FFF7ED] text-body-md form-input-focus transition-all placeholder:text-outline-variant" id="babyName" placeholder="e.g. Noah Liam" type="text"/>
</div>
<!-- Date of Birth -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md ml-2 text-on-surface-variant" for="dob">Date of Birth</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl border-none bg-[#FFF7ED] text-body-md form-input-focus transition-all" id="dob" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface-variant pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Gender Selection -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md ml-2 text-on-surface-variant">Gender (Optional)</label>
<div class="flex gap-3">
<button class="gender-btn flex-1 h-12 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95" onclick="toggleSelection(this, 'gender')" type="button">Boy</button>
<button class="gender-btn flex-1 h-12 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95" onclick="toggleSelection(this, 'gender')" type="button">Girl</button>
<button class="gender-btn flex-1 h-12 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95" onclick="toggleSelection(this, 'gender')" type="button">Other</button>
</div>
</div>
<!-- Feeding Preference -->
<div class="space-y-3 pt-2">
<label class="font-label-md text-label-md ml-2 text-on-surface-variant">Feeding Preference</label>
<div class="grid grid-cols-1 gap-3">
<button class="feeding-btn flex items-center justify-between w-full h-14 px-5 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95 group" onclick="toggleSelection(this, 'feeding')" type="button">
<span class="flex items-center gap-3"><span class="material-symbols-outlined text-primary group-[.radio-tile-active]:text-on-primary-container">favorite</span> Breastfeeding</span>
<span class="material-symbols-outlined text-outline-variant group-[.radio-tile-active]:text-on-primary-container">check_circle</span>
</button>
<button class="feeding-btn flex items-center justify-between w-full h-14 px-5 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95 group" onclick="toggleSelection(this, 'feeding')" type="button">
<span class="flex items-center gap-3"><span class="material-symbols-outlined text-primary group-[.radio-tile-active]:text-on-primary-container">sanitizer</span> Formula</span>
<span class="material-symbols-outlined text-outline-variant group-[.radio-tile-active]:text-on-primary-container">check_circle</span>
</button>
<button class="feeding-btn flex items-center justify-between w-full h-14 px-5 rounded-xl bg-[#FFF7ED] font-label-md text-label-md transition-all hover:bg-secondary-container active:scale-95 group" onclick="toggleSelection(this, 'feeding')" type="button">
<span class="flex items-center gap-3"><span class="material-symbols-outlined text-primary group-[.radio-tile-active]:text-on-primary-container">all_inclusive</span> Mixed</span>
<span class="material-symbols-outlined text-outline-variant group-[.radio-tile-active]:text-on-primary-container">check_circle</span>
</button>
</div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<p class="hidden text-center font-label-md text-label-md text-tertiary" id="saveFeedback" aria-live="polite"></p>
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline-md rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="saveBabyButton" type="submit">
                        Create Baby Profile
                        <span class="material-symbols-outlined">celebration</span>
</button>
</div>
</form>
</div>
</main>
<!-- Navigation suppressed for linear onboarding task -->
<script type="module">
        const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
        const { babyProfile: mockBabyProfile } = await import(`${moduleBase}data/mockData.mjs`);
        const {
            createBabyProfileRemote,
            getBabyProfileByIdRemote,
            loadBabyProfilesRemote,
            updateBabyProfileRemote
        } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
        const { goToScreen, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);
        const { isLoggedIn } = await import(`${moduleBase}utils/localAuth.mjs`);
        const { fileToCroppedAvatarDataUrl, persistAvatar } = await import(`${moduleBase}utils/imageUpload.mjs`);
        const { getBabyPermissions, redirectViewOnly, viewOnlyMessage } = await import(`${moduleBase}utils/permissions.mjs`);

        if (!(await isLoggedIn())) {
            window.location.replace(screenUrl("auth_welcome"));
            await new Promise(() => {});
        }

        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode") === "edit" ? "edit" : "create";
        const editId = params.get("id");
        const avatarInput = document.getElementById('avatarInput');
        const babyAvatarPreview = document.getElementById('babyAvatarPreview');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        const nameInput = document.getElementById("babyName");
        const dobInput = document.getElementById("dob");
        const formTitle = document.getElementById("formTitle");
        const formSubtitle = document.getElementById("formSubtitle");
        const saveButton = document.getElementById("saveBabyButton");
        const saveFeedback = document.getElementById("saveFeedback");
        let avatarDataUrl = "";
        let editingProfile = null;

        avatarInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                try {
                    avatarDataUrl = await fileToCroppedAvatarDataUrl(file, {
                        outputSize: 720,
                        quality: 0.82,
                        title: "Adjust baby photo",
                        helpText: "Crop the photo so your baby fits nicely in the circle."
                    });
                    if (!avatarDataUrl) {
                        avatarInput.value = "";
                        return;
                    }
                    avatarDataUrl = await persistAvatar(avatarDataUrl, { folder: "baby" });
                    babyAvatarPreview.src = avatarDataUrl;
                    babyAvatarPreview.classList.remove('hidden');
                    avatarPlaceholder.classList.add('hidden');
                } catch (error) {
                    showFeedback(error.message);
                    avatarInput.value = "";
                }
            }
        });

        // Toggle selection for buttons
        function toggleSelection(element, group) {
            const buttons = document.querySelectorAll(`.${group}-btn`);
            buttons.forEach(btn => btn.classList.remove('radio-tile-active'));
            element.classList.add('radio-tile-active');
        }
        window.toggleSelection = toggleSelection;

        await setupMode();

        document.getElementById('babyProfileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const currentState = await loadBabyProfilesRemote(mockBabyProfile);
            const currentPermissions = await getBabyPermissions(currentState.selectedBabyId);
            if ((mode === "edit" || currentState.profiles.length > 0) && !currentPermissions.canManageBaby) {
                showFeedback(viewOnlyMessage);
                return;
            }
            const btn = saveButton;
            const name = nameInput.value.trim();
            const dateOfBirth = dobInput.value;

            if (!name || !dateOfBirth) {
                showFeedback("Add baby name and date of birth to save.");
                return;
            }

            const selectedGender = document.querySelector(".gender-btn.radio-tile-active")?.textContent.trim().toLowerCase() || "";
            const selectedFeeding = document.querySelector(".feeding-btn.radio-tile-active")?.textContent.trim().replace(/\s+/g, " ") || "";
            const profileData = {
                ...(editingProfile || {}),
                name,
                dateOfBirth,
                gender: selectedGender,
                feedingPreference: selectedFeeding,
                photoUrl: avatarDataUrl || editingProfile?.photoUrl || ""
            };

            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Saving...';
            btn.disabled = true;

            try {
                const saved = mode === "edit"
                    ? await updateBabyProfileRemote(profileData, mockBabyProfile)
                    : await createBabyProfileRemote(profileData, mockBabyProfile);
                btn.innerHTML = mode === "edit"
                    ? '<span class="material-symbols-outlined">done</span> Profile Updated'
                    : '<span class="material-symbols-outlined">done</span> Profile Created';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                btn.classList.replace('text-on-primary-container', 'text-on-tertiary-container');
                
                setTimeout(() => {
                    goToScreen("home_dashboard");
                }, 450);
            } catch (error) {
                showFeedback(error.message || "Could not save baby profile.");
                btn.innerHTML = mode === "edit"
                    ? 'Save Changes <span class="material-symbols-outlined">check_circle</span>'
                    : 'Create Baby Profile <span class="material-symbols-outlined">celebration</span>';
                btn.disabled = false;
            }
        });

        document.getElementById("babyProfileBackButton").addEventListener("click", () => {
            window.location.href = screenUrl("baby_profiles");
        });

        async function setupMode() {
            const babyState = await loadBabyProfilesRemote(mockBabyProfile);
            if (babyState.error) showFeedback(babyState.error);
            const permissions = await getBabyPermissions(babyState.selectedBabyId);
            if ((mode === "edit" || babyState.profiles.length > 0) && !permissions.canManageBaby) {
                redirectViewOnly(screenUrl);
                await new Promise(() => {});
            }
            editingProfile = mode === "edit"
                ? await getBabyProfileByIdRemote(editId, mockBabyProfile)
                : null;

            if (mode === "edit" && editingProfile) {
                document.title = "Edit Baby Profile - LittleNest MY";
                formTitle.textContent = "Edit Baby Profile";
                formSubtitle.textContent = "Update details for the current baby profile.";
                saveButton.innerHTML = 'Save Changes <span class="material-symbols-outlined">check_circle</span>';
                nameInput.value = editingProfile.name || "";
                dobInput.value = editingProfile.dateOfBirth || "";
                avatarDataUrl = editingProfile.photoUrl || "";
                if (avatarDataUrl) {
                    babyAvatarPreview.src = avatarDataUrl;
                    babyAvatarPreview.classList.remove("hidden");
                    avatarPlaceholder.classList.add("hidden");
                }
                activateButton(".gender-btn", editingProfile.gender);
                activateButton(".feeding-btn", editingProfile.feedingPreference);
                return;
            }

            document.title = "Add New Baby - LittleNest MY";
            formTitle.textContent = babyState.profiles.length ? "Add New Baby" : "No baby profile yet";
            formSubtitle.textContent = babyState.profiles.length
                ? "Create another baby profile without losing existing profiles."
                : "Create your first baby profile to start tracking care.";
            saveButton.innerHTML = 'Create Baby Profile <span class="material-symbols-outlined">celebration</span>';
        }

        function activateButton(selector, value) {
            if (!value) return;
            const normalized = String(value).toLowerCase();
            const button = [...document.querySelectorAll(selector)].find((item) => item.textContent.trim().toLowerCase().includes(normalized));
            if (button) toggleSelection(button, selector.includes("gender") ? "gender" : "feeding");
        }

        function showFeedback(message) {
            saveFeedback.textContent = message;
            saveFeedback.classList.remove("hidden");
            setTimeout(() => saveFeedback.classList.add("hidden"), 2600);
        }
    </script>
<script type="module" src="/src/utils/navigation.mjs"></script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
