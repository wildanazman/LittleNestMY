<script type="module">
const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
const { loadCoreLogsRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
const { loadMamaCareData } = await import(`${moduleBase}utils/mamaCareRemote.mjs`);
const { loadCalendarEventsRemote } = await import(`${moduleBase}utils/calendarEventsRemote.mjs`);
const { calculateBabyAge, profileAgeDisplay, formatDuration, isSameLocalDay } = await import(`${moduleBase}utils/dateFormat.mjs`);
const { bindPrototypeActions, goToScreen, goBackOrTo, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);
const { isLoggedIn } = await import(`${moduleBase}utils/localAuth.mjs`);

let shareText = "";
const now = new Date();

if (!(await isLoggedIn())) {
  window.location.replace(screenUrl("auth_welcome"));
  await new Promise(() => {});
}

document.getElementById("backButton").addEventListener("click", () => goBackOrTo("home_dashboard"));
document.getElementById("copyButton").addEventListener("click", copySummary);
document.getElementById("whatsappButton").addEventListener("click", shareSummary);
document.getElementById("previewShareButton").addEventListener("click", shareSummary);
document.getElementById("weeklyInsightsButton").addEventListener("click", () => goToScreen("weekly_insights"));

await renderSummary();
bindPrototypeActions();

async function renderSummary() {
  const babyState = await loadBabyProfilesRemote(babyProfile);
  const baby = babyState.selectedBaby;
  const babyId = babyState.selectedBabyId;
  if (!baby || !babyId) {
    shareText = "LittleNest MY Today Summary\nNo baby profile yet.\nCreate a baby profile first to start a family handoff.";
    document.getElementById("summarySubtitle").textContent = "Create a baby profile first.";
    document.getElementById("summaryCards").innerHTML = card("Baby", "No profile", "Create one first", "child_care");
    document.getElementById("summaryText").textContent = shareText;
    return;
  }

  const core = await loadCoreLogsRemote(babyId, { feedingLogs: [], sleepLogs: [], diaperLogs: [], healthNotes: [] });
  const calState = await loadCalendarEventsRemote(babyId, []).catch(() => ({ calendarEvents: [] }));
  const calendarEvents = calState.calendarEvents;
  const mama = await loadMamaCareData(babyId);
  const feedingLogs = core.feedingLogs || [];
  const sleepLogs = core.sleepLogs || [];
  const diaperLogs = core.diaperLogs || [];
  const healthNotes = core.healthNotes || [];
  const feedingSummary = buildFeedingSummary(feedingLogs, now);
  const sleepMinutes = getTodaySleepMinutes(sleepLogs, now);
  const todayDiapers = diaperLogs.filter((log) => isSameLocalDay(log.changedAt, now));
  const todayHealth = healthNotes.filter((note) => isSameLocalDay(note.recordedAt || note.loggedAt, now));
  const nextEvent = calendarEvents.filter((event) => new Date(event.startsAt) >= now).sort((a, b) => new Date(a.startsAt) - new Date(b.startsAt))[0];
  const todayKey = localDate(now);
  const mamaCheckin = mama.error ? null : mama.checkins.find((item) => item.checkinDate === todayKey);
  const mamaMeds = mama.error ? [] : mama.medications.filter((item) => item.medicationTime && localDate(new Date(item.medicationTime)) === todayKey);
  const mamaMedsTaken = mamaMeds.filter((item) => item.status === "taken").length;

  const sleepLabel = sleepMinutes ? formatDuration(sleepMinutes) : "0h";
  const diaperLabel = `${todayDiapers.length} today`;
  const healthLabel = todayHealth.length ? `${todayHealth.length} note${todayHealth.length === 1 ? "" : "s"} today` : "No health notes";
  const eventLabel = nextEvent ? `${nextEvent.title} (${new Date(nextEvent.startsAt).toLocaleDateString("en-MY", { day: "numeric", month: "short" })})` : "No upcoming";
  const mamaLabel = mamaCheckin ? `${mamaCheckin.mood || "Checked"}${mamaMeds.length ? `, meds ${mamaMedsTaken}/${mamaMeds.length}` : ""}` : (mamaMeds.length ? `Meds ${mamaMedsTaken}/${mamaMeds.length}` : "Not checked");

  const ageDisplay = profileAgeDisplay(baby, now);
  document.getElementById("summarySubtitle").textContent = `${baby.name} · ${ageDisplay.corrected || ageDisplay.actual}`;
  if (ageDisplay.corrected) {
    document.getElementById("summarySubtitle").innerHTML = `${escapeHtml(baby.name)} · ${escapeHtml(ageDisplay.actual)} <span class="inline-flex items-center gap-1 rounded-full bg-gradient-to-r from-tertiary-container/50 to-tertiary-container/30 text-on-tertiary-container px-2 py-0.5 text-[10px] font-bold border border-tertiary-container/25 shadow-sm"><span class="material-symbols-outlined text-[12px]">child_care</span>Corrected: ${escapeHtml(ageDisplay.corrected)}</span>`;
  }
  document.getElementById("summaryDate").textContent = now.toLocaleDateString("en-MY", { weekday: "long", day: "numeric", month: "short" });
  document.getElementById("summaryHeadline").textContent = buildHeadline(baby.name, feedingSummary.count, sleepMinutes, todayDiapers.length);
  document.getElementById("summaryCards").innerHTML = [
    card("Feed", feedingSummary.value, feedingSummary.detail, "restaurant", "feed"),
    card("Sleep", sleepLabel, "Total sleep today", "bedtime", "sleep"),
    card("Diaper", diaperLabel, "Wet, dirty, or mixed", "baby_changing_station", "diaper"),
    card("Health", healthLabel, "For records only", "medical_information", "health"),
    card("Mama Care", mamaLabel, "Family support check", "self_care", "mama"),
    card("Next", eventLabel, "Appointment or reminder", "event", "next")
  ].join("");

  shareText = [
    "LittleNest MY Today Summary",
    `${baby.name} - ${ageDisplay.corrected || ageDisplay.actual}`,
    `Feed: ${feedingSummary.share}`,
    `Sleep: ${sleepLabel} today`,
    `Diapers: ${diaperLabel}`,
    `Health: ${healthLabel}`,
    `Mama Care: ${mamaLabel}`,
    `Next: ${eventLabel}`,
    "Note: Rough tracking is okay."
  ].join("\n");
  document.getElementById("summaryText").textContent = shareText;
}

function card(title, value, detail, icon, tone = "feed") {
  return `
    <article class="ds-card" data-tone="${tone}">
      <span class="ds-icon"><span class="material-symbols-outlined">${icon}</span></span>
      <p class="ds-label">${escapeHtml(title)}</p>
      <p class="ds-value">${escapeHtml(value)}</p>
      <p class="ds-detail">${escapeHtml(detail)}</p>
    </article>
  `;
}

function buildHeadline(name, feedsToday, sleepMinutes, diaperCount) {
  const parts = [];
  if (feedsToday) parts.push(`${feedsToday} feed${feedsToday === 1 ? "" : "s"}`);
  if (sleepMinutes) parts.push(`${formatDuration(sleepMinutes)} sleep`);
  if (diaperCount) parts.push(`${diaperCount} diaper change${diaperCount === 1 ? "" : "s"}`);
  if (!parts.length) return `No logs yet today — add what you remember for ${name}.`;
  const list = parts.length > 1
    ? `${parts.slice(0, -1).join(", ")} and ${parts[parts.length - 1]}`
    : parts[0];
  return `${name} had ${list} so far today.`;
}

function buildFeedingSummary(feedingLogs, date) {
  const todayFeeds = (feedingLogs || []).filter((log) => isSameLocalDay(log.startedAt, date));
  if (!todayFeeds.length) {
    return {
      count: 0,
      value: "No feeds yet",
      detail: "Add what you remember",
      share: "No feeds logged today"
    };
  }

  const totals = todayFeeds.reduce((acc, log) => {
    const type = String(log.type || "").toLowerCase();
    const amountMl = Number(log.amountMl) || 0;
    const amountGrams = Number(log.amountGrams) || 0;
    const minutes = feedingMinutes(log);

    if (type === "breast") {
      if (minutes > 0) acc.breastMinutes += minutes;
      else acc.breastCount += 1;
    } else if (type === "formula") {
      if (amountMl > 0) acc.formulaMl += amountMl;
      else acc.formulaCount += 1;
    } else if (type === "bottle") {
      if (amountMl > 0) acc.bottleMl += amountMl;
      else acc.bottleCount += 1;
    } else if (type === "solid") {
      if (amountGrams > 0) acc.solidGrams += amountGrams;
      else acc.solidCount += 1;
    } else {
      acc.otherCount += 1;
    }
    return acc;
  }, {
    breastMinutes: 0,
    breastCount: 0,
    formulaMl: 0,
    formulaCount: 0,
    bottleMl: 0,
    bottleCount: 0,
    solidGrams: 0,
    solidCount: 0,
    otherCount: 0
  });

  const parts = [];
  if (totals.breastMinutes) parts.push(`BF ${formatDuration(totals.breastMinutes)}`);
  if (totals.breastCount) parts.push(`BF ${totals.breastCount}x`);
  if (totals.formulaMl) parts.push(`Formula ${roundTotal(totals.formulaMl)}ml`);
  if (totals.formulaCount) parts.push(`Formula ${totals.formulaCount}x`);
  if (totals.bottleMl) parts.push(`Bottle ${roundTotal(totals.bottleMl)}ml`);
  if (totals.bottleCount) parts.push(`Bottle ${totals.bottleCount}x`);
  if (totals.solidGrams) parts.push(`Solid ${roundTotal(totals.solidGrams)}g`);
  if (totals.solidCount) parts.push(`Solid ${totals.solidCount}x`);
  if (totals.otherCount) parts.push(`${totals.otherCount} other`);

  const countLabel = `${todayFeeds.length} feed${todayFeeds.length === 1 ? "" : "s"} today`;
  return {
    count: todayFeeds.length,
    value: parts.length ? parts.slice(0, 2).join(" • ") : countLabel,
    detail: parts.slice(2).join(" • ") || countLabel,
    share: parts.length ? `${parts.join(", ")} (${countLabel})` : countLabel
  };
}

function feedingMinutes(log) {
  const explicit = Number(log.durationMinutes) || 0;
  if (explicit > 0) return explicit;
  if (!log.startedAt || !log.endedAt) return 0;
  return Math.max(0, Math.round((new Date(log.endedAt) - new Date(log.startedAt)) / 60000));
}

function roundTotal(value) {
  const rounded = Math.round(Number(value) || 0);
  return Number.isFinite(rounded) ? rounded : 0;
}

function getTodaySleepMinutes(logs, date) {
  const dayStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);
  return logs.reduce((total, log) => {
    const start = new Date(log.startedAt);
    const end = log.endedAt ? new Date(log.endedAt) : date;
    const overlapStart = new Date(Math.max(start, dayStart));
    const overlapEnd = new Date(Math.min(end, dayEnd));
    return total + Math.max(0, Math.round((overlapEnd - overlapStart) / 60000));
  }, 0);
}

function localDate(date) {
  const copy = new Date(date);
  copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
  return copy.toISOString().slice(0, 10);
}

async function copySummary() {
  try {
    await navigator.clipboard.writeText(shareText);
    showFeedback("Summary copied.");
  } catch {
    showFeedback("Copy did not work here. You can select the preview text.", true);
  }
}

async function shareSummary() {
  if (navigator.share) {
    try {
      await navigator.share({ title: "LittleNest care summary", text: shareText });
      return;
    } catch (error) {
      if (error && error.name === "AbortError") return;
    }
  }

  try {
    await navigator.clipboard.writeText(shareText);
  } catch {
    // Clipboard can be blocked in some embedded browsers.
  }

  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
  const opened = window.open(whatsappUrl, "_blank", "noopener,noreferrer");
  if (!opened) {
    window.location.href = whatsappUrl;
    return;
  }
  showFeedback("Copied. Opening WhatsApp...");
}

async function shareWhatsApp() {
  // Prefer the native share sheet (WhatsApp, Copy, etc.) — most reliable on
  // mobile / installed PWA where popups to wa.me are often blocked.
  if (navigator.share) {
    try {
      await navigator.share({ title: "LittleNest care summary", text: shareText });
      return;
    } catch (error) {
      if (error && error.name === "AbortError") return; // user dismissed the sheet
      // otherwise fall through to the web fallback below
    }
  }
  // Desktop / no-share fallback: copy the text and open WhatsApp Web.
  let copied = false;
  try {
    await navigator.clipboard.writeText(shareText);
    copied = true;
  } catch {
    // clipboard may be blocked; continue to WhatsApp anyway
  }
  const opened = window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, "_blank", "noopener,noreferrer");
  showFeedback(opened ? (copied ? "Copied. Opening WhatsApp…" : "Opening WhatsApp…") : "Summary copied — paste it into WhatsApp.", !opened);
}

function showFeedback(message, persistent = false) {
  const feedback = document.getElementById("feedback");
  feedback.textContent = message;
  feedback.classList.remove("hidden");
  if (!persistent) setTimeout(() => feedback.classList.add("hidden"), 2400);
}

function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}
</script>
