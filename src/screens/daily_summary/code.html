<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#ffbfa3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/src/utils/pwa-safe-area.css?v=soft-bg-20260615"/>
<link rel="stylesheet" href="/src/utils/theme.css?v=soft-bg-20260615"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Today’s Care Summary - LittleNest MY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        surface: "#fbf9f4",
        "surface-container": "#f4ebe6",
        "surface-container-low": "#fff6f0",
        "surface-container-lowest": "#ffffff",
        "surface-container-highest": "#e9e1d8",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        tertiary: "#486646",
        "tertiary-container": "#dcefd8",
        error: "#ba1a1a"
      },
      fontFamily: { body: ["Nunito Sans", "sans-serif"] }
    }
  }
};
</script>
<style>
  body { min-height: max(884px, 100dvh); font-family: "Nunito Sans", sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-shadow { box-shadow: 0 18px 45px rgba(131, 83, 60, 0.10); }
  :root.dark .summary-card { background: #242120; border-color: rgba(255,255,255,.10); }
</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<header class="sticky top-0 z-40 bg-surface/95 backdrop-blur px-5 h-16 flex items-center justify-between">
  <button class="w-10 h-10 rounded-full bg-surface-container text-primary flex items-center justify-center active:scale-95 transition-transform" id="backButton" type="button" aria-label="Back">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="text-[20px] leading-7 font-extrabold text-primary">Care Summary</h1>
  <button class="w-10 h-10 rounded-full bg-primary-container text-primary flex items-center justify-center active:scale-95 transition-transform" data-screen-target="settings" type="button" aria-label="Open settings">
    <span class="material-symbols-outlined">account_circle</span>
  </button>
</header>

<main class="max-w-md mx-auto px-5 pt-5 space-y-5">
  <section class="rounded-[28px] bg-primary-container p-5 soft-shadow">
    <p class="text-[13px] font-extrabold uppercase tracking-wide text-primary">Family handoff</p>
    <h2 class="mt-1 text-[28px] leading-9 font-extrabold text-on-primary-container">Today’s Care Summary</h2>
    <p class="mt-1 text-[15px] leading-6 text-on-primary-container/80" id="summarySubtitle">Preparing calm update...</p>
    <div class="mt-4 flex gap-2">
      <button class="flex-1 h-12 rounded-full bg-primary text-on-primary font-extrabold active:scale-95 transition-transform" id="copyButton" type="button">Copy Summary</button>
      <button class="flex-1 h-12 rounded-full bg-white/70 text-primary font-extrabold active:scale-95 transition-transform dark:bg-white/10" id="whatsappButton" type="button">WhatsApp</button>
    </div>
  </section>

  <p class="hidden rounded-2xl bg-tertiary-container p-3 text-[14px] font-extrabold text-tertiary" id="feedback" aria-live="polite"></p>

  <section class="grid grid-cols-2 gap-3" id="summaryCards"></section>

  <section class="summary-card rounded-[26px] bg-surface-container-lowest border border-white/60 p-5 soft-shadow">
    <div class="flex items-center justify-between gap-3">
      <h2 class="text-[21px] leading-7 font-extrabold text-on-surface">Share Preview</h2>
      <span class="material-symbols-outlined text-primary">ios_share</span>
    </div>
    <pre class="mt-4 whitespace-pre-wrap break-words rounded-2xl bg-surface-container-low p-4 text-[14px] leading-6 text-on-surface-variant" id="summaryText">Loading...</pre>
  </section>

  <section class="summary-card rounded-[24px] bg-surface-container-lowest border border-white/60 p-4 soft-shadow">
    <button class="w-full flex items-center justify-between gap-3 text-left" id="weeklyInsightsButton" type="button">
      <span>
        <span class="block text-[12px] font-extrabold uppercase tracking-wide text-primary">More context</span>
        <span class="block text-[19px] leading-7 font-extrabold text-on-surface">View this week’s pattern</span>
        <span class="block text-[14px] text-on-surface-variant">Review sleep, feeding, diaper, and Mama Care trends.</span>
      </span>
      <span class="material-symbols-outlined text-primary">chevron_right</span>
    </button>
  </section>

  <section class="rounded-[22px] bg-surface-container-low p-4 border border-primary-container">
    <p class="text-[14px] leading-6 text-on-surface-variant">This summary is for family coordination only. Rough tracking is okay. For medical concerns, please consult a doctor or Klinik Kesihatan.</p>
  </section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-highest shadow-[0_-4px_12px_rgba(255,191,163,0.15)] rounded-t-xl px-2 pb-4 pt-2 flex justify-around items-center">
  <button data-screen-target="home_dashboard"><span class="material-symbols-outlined">home</span><span>Home</span></button>
  <button data-screen-target="quick_log"><span class="material-symbols-outlined">add_circle</span><span>Log</span></button>
  <button data-screen-target="calendar"><span class="material-symbols-outlined">calendar_month</span><span>Calendar</span></button>
  <button data-screen-target="milestones"><span class="material-symbols-outlined">auto_awesome</span><span>Milestones</span></button>
  <button data-screen-target="assistant"><span class="material-symbols-outlined">smart_toy</span><span>Assistant</span></button>
</nav>

<script type="module">
const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
const { loadCoreLogsRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
const { loadMamaCareData } = await import(`${moduleBase}utils/mamaCareRemote.mjs`);
const { loadCalendarEventsRemote } = await import(`${moduleBase}utils/calendarEventsRemote.mjs`);
const { calculateBabyAge, formatDuration, formatRelativeTime, isSameLocalDay } = await import(`${moduleBase}utils/dateFormat.mjs`);
const { bindPrototypeActions, goToScreen, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);
const { isLoggedIn } = await import(`${moduleBase}utils/localAuth.mjs`);

let shareText = "";
const now = new Date();

if (!(await isLoggedIn())) {
  window.location.replace(screenUrl("auth_welcome"));
  await new Promise(() => {});
}

document.getElementById("backButton").addEventListener("click", () => goToScreen("home_dashboard"));
document.getElementById("copyButton").addEventListener("click", copySummary);
document.getElementById("whatsappButton").addEventListener("click", shareWhatsApp);
document.getElementById("weeklyInsightsButton").addEventListener("click", () => goToScreen("weekly_insights"));

await renderSummary();
bindPrototypeActions();

async function renderSummary() {
  const babyState = await loadBabyProfilesRemote(babyProfile);
  const baby = babyState.selectedBaby;
  const babyId = babyState.selectedBabyId;
  if (!baby || !babyId) {
    shareText = "LittleNest MY Today Summary\nNo baby profile yet.\nCreate a baby profile first to start a family handoff.";
    document.getElementById("summarySubtitle").textContent = "Create a baby profile first.";
    document.getElementById("summaryCards").innerHTML = card("Baby", "No profile", "Create one first", "child_care");
    document.getElementById("summaryText").textContent = shareText;
    return;
  }

  const core = await loadCoreLogsRemote(babyId, { feedingLogs: [], sleepLogs: [], diaperLogs: [], healthNotes: [] });
  const calState = await loadCalendarEventsRemote(babyId, []).catch(() => ({ calendarEvents: [] }));
  const calendarEvents = calState.calendarEvents;
  const mama = await loadMamaCareData(babyId);
  const feedingLogs = core.feedingLogs || [];
  const sleepLogs = core.sleepLogs || [];
  const diaperLogs = core.diaperLogs || [];
  const healthNotes = core.healthNotes || [];
  const latestFeed = [...feedingLogs].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt))[0];
  const sleepMinutes = getTodaySleepMinutes(sleepLogs, now);
  const todayDiapers = diaperLogs.filter((log) => isSameLocalDay(log.changedAt, now));
  const todayHealth = healthNotes.filter((note) => isSameLocalDay(note.recordedAt || note.loggedAt, now));
  const nextEvent = calendarEvents.filter((event) => new Date(event.startsAt) >= now).sort((a, b) => new Date(a.startsAt) - new Date(b.startsAt))[0];
  const todayKey = localDate(now);
  const mamaCheckin = mama.error ? null : mama.checkins.find((item) => item.checkinDate === todayKey);
  const mamaMeds = mama.error ? [] : mama.medications.filter((item) => item.medicationTime && localDate(new Date(item.medicationTime)) === todayKey);
  const mamaMedsTaken = mamaMeds.filter((item) => item.status === "taken").length;

  const feedLabel = latestFeed ? `${formatRelativeTime(latestFeed.startedAt, now)} ago` : "No feeds yet";
  const sleepLabel = sleepMinutes ? formatDuration(sleepMinutes) : "0h";
  const diaperLabel = `${todayDiapers.length} today`;
  const healthLabel = todayHealth.length ? `${todayHealth.length} note${todayHealth.length === 1 ? "" : "s"} today` : "No health notes";
  const eventLabel = nextEvent ? `${nextEvent.title} (${new Date(nextEvent.startsAt).toLocaleDateString("en-MY", { day: "numeric", month: "short" })})` : "No upcoming";
  const mamaLabel = mamaCheckin ? `${mamaCheckin.mood || "Checked"}${mamaMeds.length ? `, meds ${mamaMedsTaken}/${mamaMeds.length}` : ""}` : (mamaMeds.length ? `Meds ${mamaMedsTaken}/${mamaMeds.length}` : "Not checked");

  document.getElementById("summarySubtitle").textContent = `${baby.name} - ${calculateBabyAge(baby.dateOfBirth, now)}`;
  document.getElementById("summaryCards").innerHTML = [
    card("Feed", feedLabel, latestFeed ? feedingDetail(latestFeed) : "Add what you remember", "restaurant"),
    card("Sleep", sleepLabel, "Total sleep today", "bedtime"),
    card("Diaper", diaperLabel, "Wet, dirty, or mixed", "baby_changing_station"),
    card("Health", healthLabel, "For records only", "medical_information"),
    card("Mama Care", mamaLabel, "Family support check", "self_care"),
    card("Next", eventLabel, "Appointment or reminder", "event")
  ].join("");

  shareText = [
    "LittleNest MY Today Summary",
    `${baby.name} - ${calculateBabyAge(baby.dateOfBirth, now)}`,
    `Feed: ${feedLabel}`,
    `Sleep: ${sleepLabel} today`,
    `Diapers: ${diaperLabel}`,
    `Health: ${healthLabel}`,
    `Mama Care: ${mamaLabel}`,
    `Next: ${eventLabel}`,
    "Note: Rough tracking is okay."
  ].join("\n");
  document.getElementById("summaryText").textContent = shareText;
}

function card(title, value, detail, icon) {
  return `
    <article class="summary-card rounded-[22px] bg-surface-container-lowest border border-white/60 p-4 soft-shadow">
      <div class="flex items-center gap-2 text-primary">
        <span class="material-symbols-outlined">${icon}</span>
        <p class="text-[12px] font-extrabold uppercase tracking-wide">${title}</p>
      </div>
      <p class="mt-2 text-[20px] leading-7 font-extrabold text-on-surface">${escapeHtml(value)}</p>
      <p class="text-[13px] leading-5 text-on-surface-variant">${escapeHtml(detail)}</p>
    </article>
  `;
}

function feedingDetail(log) {
  if (log.amountMl) return `${log.amountMl} ml`;
  if (log.amountGrams) return `${log.amountGrams} g solid`;
  if (log.durationMinutes) return formatDuration(log.durationMinutes);
  return log.type || "Logged";
}

function getTodaySleepMinutes(logs, date) {
  const dayStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);
  return logs.reduce((total, log) => {
    const start = new Date(log.startedAt);
    const end = log.endedAt ? new Date(log.endedAt) : date;
    const overlapStart = new Date(Math.max(start, dayStart));
    const overlapEnd = new Date(Math.min(end, dayEnd));
    return total + Math.max(0, Math.round((overlapEnd - overlapStart) / 60000));
  }, 0);
}

function localDate(date) {
  const copy = new Date(date);
  copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
  return copy.toISOString().slice(0, 10);
}

async function copySummary() {
  try {
    await navigator.clipboard.writeText(shareText);
    showFeedback("Summary copied.");
  } catch {
    showFeedback("Copy did not work here. You can select the preview text.", true);
  }
}

function shareWhatsApp() {
  const url = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
  window.open(url, "_blank", "noopener,noreferrer");
}

function showFeedback(message, persistent = false) {
  const feedback = document.getElementById("feedback");
  feedback.textContent = message;
  feedback.classList.remove("hidden");
  if (!persistent) setTimeout(() => feedback.classList.add("hidden"), 2400);
}

function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}
</script>
<script type="module" src="/src/utils/navigation.mjs"></script>
</body></html>
