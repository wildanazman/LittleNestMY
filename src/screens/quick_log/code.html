<style>
        body {

            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .quick-log-overlay {
            backdrop-filter: blur(12px);
            background: linear-gradient(to bottom, rgba(251, 249, 244, 0.8), rgba(251, 249, 244, 0.95));
        }
        .category-card {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }
        .category-card:active {
            transform: scale(0.92);
        }
        .soft-shadow {

<body class="min-h-screen flex flex-col overflow-hidden">
<!-- Background Simulation (Dashboard) -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none p-container-padding space-y-lg">
<div class="h-40 w-full bg-secondary-container rounded-3xl"></div>
<div class="grid grid-cols-2 gap-gutter">
<div class="h-32 bg-surface-container rounded-3xl"></div>
<div class="h-32 bg-surface-container rounded-3xl"></div>
</div>
<div class="h-64 w-full bg-surface-container rounded-3xl"></div>
</div>
<!-- Quick Log Content Shell -->
<main class="relative z-10 flex-1 flex flex-col quick-log-overlay">
<!-- Header Section -->
<header class="flex justify-between items-center px-container-padding h-14 mt-4">
<div class="flex items-center gap-xs">
<button class="p-2 text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[28px]">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Quick Log</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
<img class="w-full h-full object-cover" data-alt="A close-up portrait of a peaceful, happy infant with soft morning light filtering through a window. The style is warm, minimalist, and organic, featuring soft textures and a gentle bokeh background. The colors are dominated by muted peaches and creams, reflecting a calm and loving nursery atmosphere." src="https://lh3.googleusercontent.com/aida/AP1WRLs2yK4zR-HEe7LguItEq9LEogMq63PKSAFsXrp9A7qoVgC9eQVhBnkt9G3h5Y-agBe7eNIlpL3OvpsYJVN_5ItyS2cPjyRZPm4yT89UCwYZVbfT6EExsYXALQUTbu_ftWUZh_NxFPC_XKihZNRS07ZXC7fjqEbMr8CeGA3dGNorN8gUBrAStb4cZUmKhvg_e0-qpJdU6ZLP4r8kxXKHpbJQxCICp8EGN1gScvmswMcJ1sg6jRzCo23Ft9WV"/>
</div>
</header>
<!-- Main Category Grid (One-Handed Focus) -->
<div class="flex-1 flex flex-col justify-end px-container-padding pb-32">
<p class="text-on-surface-variant font-label-md text-label-md mb-lg ml-2">What happened just now?</p>
<p class="sr-only" aria-live="polite" id="quickLogFeedback">Choose a log type to continue.</p>
<div class="grid grid-cols-2 gap-gutter">
<!-- Feeding Card -->
<button class="category-card aspect-square min-h-[150px] bg-primary-container/40 rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-target="/feeding_log/" type="button">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-headline-md text-headline-md text-on-primary-container">Feeding</span>
</button>
<!-- Sleep Card -->
<button class="category-card aspect-square min-h-[150px] bg-secondary-container rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-target="/sleep_log/" type="button">
<div class="w-16 h-16 rounded-full bg-[#D1E1FF] flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-[#2B478B]" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
<span class="font-headline-md text-headline-md text-on-secondary-container">Sleep</span>
</button>
<!-- Diaper Card -->
<button class="category-card aspect-square min-h-[150px] bg-tertiary-container/30 rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-target="/diaper_log/" type="button">
<div class="w-16 h-16 rounded-full bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">baby_changing_station</span>
</div>
<span class="font-headline-md text-headline-md text-on-tertiary-container">Diaper</span>
</button>
<!-- Health Card -->
<button class="category-card aspect-square min-h-[150px] bg-[#FFDAD6] rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-type="Health" type="button">
<div class="w-16 h-16 rounded-full bg-[#FFB4AB] flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-[#690005]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<span class="font-headline-md text-headline-md text-[#93000a]">Health</span>
</button>
<!-- Growth Card -->
<button class="category-card aspect-square min-h-[150px] bg-surface-container-high rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-type="Growth" type="button">
<div class="w-16 h-16 rounded-full bg-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">straighten</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface-variant">Growth</span>
</button>
<!-- Note Card -->
<button class="category-card aspect-square min-h-[150px] bg-surface-container-highest rounded-[32px] flex flex-col items-center justify-center gap-base soft-shadow" data-log-type="Note" type="button">
<div class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] text-on-secondary-fixed" style="font-variation-settings: 'FILL' 1;">edit_note</span>
</div>
<span class="font-headline-md text-headline-md text-on-secondary-fixed">Note</span>
</button>
</div>
</div>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-4 pt-2 bg-surface-container rounded-t-xl shadow-lg">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant transition-colors hover:bg-secondary-container px-4 py-1" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm-mobile">Home</span>
</a>
<!-- Log (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-sm text-label-sm-mobile">Log</span>
</a>
<!-- Calendar -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant transition-colors hover:bg-secondary-container px-4 py-1" href="#">
<span class="material-symbols-outlined">calendar_month</span>

<!-- Milestones -->

</a>

<span class="material-symbols-outlined">smart_toy</span>
<span class="font-label-sm text-label-sm-mobile">Assistant</span>
</a>
</nav>
<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('.category-card').forEach(button => {
            button.addEventListener('touchstart', () => {
                // Haptic feedback simulation can go here if supported
            });
            
            button.addEventListener('click', (e) => {
                const label = button.querySelector('span:last-child').innerText;
                const target = button.dataset.logTarget;
                const feedback = document.getElementById('quickLogFeedback');
                
                // Visual confirmation ripple effect or similar
                button.classList.add('ring-4', 'ring-primary/20');
                setTimeout(() => {
                    button.classList.remove('ring-4', 'ring-primary/20');
                }, 300);

                if (feedback) {
                    feedback.textContent = target ? `Opening ${label} log.` : `${label} selected. Form coming next.`;
                }

                if (target) {
                    setTimeout(() => {
                        window.location.href = target;
                    }, 120);
                }
            });
        });

        // Close button functionality
        document.querySelector('header button').addEventListener('click', () => {
            document.querySelector('main').style.transform = 'translateY(100%)';
            document.querySelector('main').style.transition = 'transform 0.4s cubic-bezier(0.32, 0, 0.67, 0)';
            setTimeout(() => {
                window.history.back();
            }, 400);
        });
    </script>
<script type="module" src="/src/utils/navigation.mjs"></script>
