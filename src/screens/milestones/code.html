<script type="module">
        const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
        const { babyProfile, milestones: mockMilestones } = await import(`${moduleBase}data/mockData.mjs`);
        const { calculateBabyAgeShort } = await import(`${moduleBase}utils/dateFormat.mjs`);
        const { getLogsForBaby, getPersistedMilestones, getSelectedBabyId, getSelectedBabyProfile } = await import(`${moduleBase}utils/localState.mjs`);
        const { goToScreen, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);
        const { fileToResizedDataUrl } = await import(`${moduleBase}utils/imageUpload.mjs`);
        const { deleteMilestoneRemote, loadMilestonesRemote, saveMilestoneRemote } = await import(`${moduleBase}utils/milestonesRemote.mjs`);

        const grid = document.getElementById("milestoneGrid");
        const typeInput = document.getElementById("milestoneType");
        const customTitleWrapper = document.getElementById("customMilestoneWrapper");
        const customTitleInput = document.getElementById("customMilestoneTitle");
        const dateInput = document.getElementById("milestoneDate");
        const noteInput = document.getElementById("milestoneNote");
        const photoInput = document.getElementById("milestonePhotoInput");
        const photoLabel = document.getElementById("milestonePhotoLabel");
        const saveButton = document.getElementById("saveMilestoneButton");
        const feedback = document.getElementById("milestoneFeedback");
        const addPanel = document.getElementById("addMilestonePanel");
        const fab = document.getElementById("addMilestoneFab");
        const backButton = document.getElementById("milestonesBackButton");
        const selectedBabyId = getSelectedBabyId(babyProfile);
        const selectedBaby = getSelectedBabyProfile(babyProfile) || babyProfile;
        let milestonesCache = getLogsForBaby(getPersistedMilestones([]), selectedBabyId);
        let milestonePhotoDataUrl = "";
        let editingMilestoneId = "";

        dateInput.value = new Date().toISOString().slice(0, 10);
        typeInput.addEventListener("change", () => {
            customTitleWrapper.classList.toggle("hidden", typeInput.value !== "Custom milestone");
        });
        photoInput.addEventListener("change", async (event) => {
            try {
                milestonePhotoDataUrl = await fileToResizedDataUrl(event.target.files[0], { maxSize: 900, quality: 0.82 });
                photoLabel.textContent = "Photo ready";
                showFeedback("Photo ready. It will upload to cloud when saved.");
            } catch (error) {
                milestonePhotoDataUrl = "";
                photoLabel.textContent = "Add optional photo";
                showFeedback(error.message);
            }
        });
        saveButton.addEventListener("click", saveMilestone);
        fab.addEventListener("click", () => {
            addPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            typeInput.focus();
        });
        backButton.addEventListener("click", () => goToScreen("home_dashboard"));

        // New memory-book UI elements
        const recapSection = document.getElementById("recapSection");
        const recapStrip = document.getElementById("recapStrip");
        const chipRow = document.getElementById("categoryChips");
        const storyModal = document.getElementById("storyModal");
        const storyBody = document.getElementById("storyBody");
        const storyCloseBtn = document.getElementById("storyClose");
        const storyPrevBtn = document.getElementById("storyPrev");
        const storyNextBtn = document.getElementById("storyNext");

        const CATEGORIES = [
            { key: "all", label: "All", icon: "auto_awesome" },
            { key: "smile", label: "First smile", icon: "sentiment_very_satisfied" },
            { key: "bath", label: "First bath", icon: "bathtub" },
            { key: "steps", label: "First steps", icon: "directions_walk" },
            { key: "word", label: "First word", icon: "chat_bubble" },
            { key: "custom", label: "Memories", icon: "favorite" }
        ];
        let activeCategory = "all";
        let storyOrder = [];
        let storyIndex = 0;

        storyCloseBtn.addEventListener("click", closeStory);
        storyModal.addEventListener("click", (event) => { if (event.target === storyModal || event.target === storyModal.firstElementChild) closeStory(); });
        storyPrevBtn.addEventListener("click", () => stepStory(-1));
        storyNextBtn.addEventListener("click", () => stepStory(1));
        document.addEventListener("keydown", (event) => {
            if (storyModal.classList.contains("hidden")) return;
            if (event.key === "Escape") closeStory();
            if (event.key === "ArrowLeft") stepStory(-1);
            if (event.key === "ArrowRight") stepStory(1);
        });

        renderAll();
        refreshMilestones();

        function allMemories() {
            return (milestonesCache || [])
                .sort((a, b) => new Date(b.achievedAt) - new Date(a.achievedAt));
        }

        function visibleMemories() {
            const all = allMemories();
            return activeCategory === "all" ? all : all.filter((m) => memoryCategory(m) === activeCategory);
        }

        function memoryCategory(m) {
            const t = (m.title || "").toLowerCase();
            if (t.includes("smile") || t.includes("laugh")) return "smile";
            if (t.includes("bath")) return "bath";
            if (t.includes("step") || t.includes("walk") || t.includes("roll") || t.includes("crawl")) return "steps";
            if (t.includes("word") || t.includes("mama") || t.includes("papa") || t.includes("talk")) return "word";
            return "custom";
        }

        function memDate(m) { return new Date(`${m.achievedAt}T00:00:00+08:00`); }
        function dateLabelOf(m) { return memDate(m).toLocaleDateString("en-MY", { day: "numeric", month: "short", year: "numeric" }); }
        function ageOf(m) { return calculateBabyAgeShort(selectedBaby.dateOfBirth, memDate(m)); }

        async function saveMilestone() {
            const title = typeInput.value === "Custom milestone" ? customTitleInput.value.trim() : typeInput.value.trim();
            const achievedAt = dateInput.value;
            const notes = noteInput.value.trim();

            if (!title || !achievedAt) {
                showFeedback("Choose a milestone type and date.");
                return;
            }
            const babyDob = new Date(`${selectedBaby.dateOfBirth}T00:00:00+08:00`);
            const milestoneDate = new Date(`${achievedAt}T00:00:00+08:00`);
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            if (milestoneDate < babyDob) {
                showFeedback("Milestone date cannot be before baby's date of birth.");
                return;
            }
            if (milestoneDate > today) {
                showFeedback("Choose today or a past date for a memory.");
                return;
            }

            saveButton.disabled = true;
            saveButton.textContent = editingMilestoneId ? "Updating..." : "Saving...";
            const milestoneDraft = {
                id: editingMilestoneId || (crypto.randomUUID ? crypto.randomUUID() : `milestone-local-${Date.now()}`),
                babyId: selectedBabyId,
                title,
                achievedAt,
                category: categoryForTitle(title),
                notes: notes || undefined,
                photoUrl: milestonePhotoDataUrl || undefined
            };
            try {
                const saved = await saveMilestoneRemote(milestoneDraft);
                milestonesCache = [saved, ...milestonesCache.filter((item) => item.id !== saved.id && item.id !== editingMilestoneId)];

                noteInput.value = "";
                customTitleInput.value = "";
                typeInput.value = "First smile";
                customTitleWrapper.classList.add("hidden");
                photoInput.value = "";
                photoLabel.textContent = "Add optional photo";
                milestonePhotoDataUrl = "";
                editingMilestoneId = "";
                saveButton.textContent = "Save Milestone";
                renderAll();
                showFeedback(saved.photoUrl?.startsWith("http") ? "Saved to cloud memory book." : "Saved to memory book.");
            } catch (error) {
                milestonesCache = [milestoneDraft, ...milestonesCache.filter((item) => item.id !== milestoneDraft.id && item.id !== editingMilestoneId)];
                renderAll();
                saveButton.textContent = editingMilestoneId ? "Update memory" : "Save Milestone";
                showFeedback(`${error.message || "Cloud save failed."} Memory kept on this device.`);
            } finally {
                saveButton.disabled = false;
            }
        }

        async function refreshMilestones() {
            const result = await loadMilestonesRemote(selectedBabyId, []);
            milestonesCache = result.milestones || [];
            renderAll();
            if (result.error) showFeedback(result.error);
        }

        function renderAll() {
            renderHero();
            renderRecap();
            renderChips();
            renderFeed();
        }

        function renderHero() {
            const all = allMemories();
            const name = selectedBaby?.name ? selectedBaby.name.split(" ")[0] : "your little one";
            const sub = document.getElementById("memoryHeroSub");
            if (sub) {
                sub.textContent = all.length
                    ? `${all.length} ${all.length === 1 ? "memory" : "memories"} of ${name}, kept warm and close.`
                    : `Start ${name}'s keepsake — one tiny first at a time.`;
            }
        }

        function renderChips() {
            chipRow.innerHTML = CATEGORIES.map((c) => {
                const active = c.key === activeCategory;
                return `
                    <button class="shrink-0 inline-flex items-center gap-1.5 h-10 px-4 rounded-full font-label-md text-label-md transition-colors ${active ? "bg-primary text-on-primary shadow-sm" : "bg-surface-container-low text-on-surface-variant"}" data-chip="${c.key}" type="button">
                        <span class="material-symbols-outlined text-[18px]">${c.icon}</span>${c.label}
                    </button>`;
            }).join("");
            chipRow.querySelectorAll("[data-chip]").forEach((btn) => btn.addEventListener("click", () => {
                activeCategory = btn.dataset.chip;
                renderChips();
                renderFeed();
            }));
        }

        function renderRecap() {
            const all = allMemories();
            if (!all.length) { recapSection.classList.add("hidden"); return; }
            const groups = new Map();
            for (const m of all) {
                const d = memDate(m);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(m);
            }
            const months = [...groups.entries()].sort((a, b) => b[0].localeCompare(a[0]));
            recapStrip.innerHTML = months.map(([key, items]) => {
                const label = new Date(`${key}-01T00:00:00`).toLocaleDateString("en-MY", { month: "long", year: "numeric" });
                const photos = items.filter((m) => m.photoUrl).length;
                const cover = items.find((m) => m.photoUrl)?.photoUrl;
                return `
                    <button class="recap-card shrink-0 w-[180px] text-left rounded-[24px] overflow-hidden shadow-[0_12px_34px_rgba(124,92,255,0.12)] relative" data-recap="${items[0].id}" type="button">
                        <div class="relative h-[120px] bg-gradient-to-br from-[#efe7ff] via-[#ffeef4] to-[#e6f6ff]">
                            ${cover ? `<img class="w-full h-full object-cover" src="${cover}" alt="">` : `<div class="w-full h-full flex items-center justify-center text-primary/70"><span class="material-symbols-outlined text-[40px]" style="font-variation-settings:'FILL' 1;">photo_album</span></div>`}
                            <div class="absolute inset-0 bg-gradient-to-t from-black/45 to-transparent"></div>
                            <p class="absolute bottom-2 left-3 right-3 text-white font-headline-md text-headline-md leading-tight">${label}</p>
                        </div>
                        <div class="bg-surface-container-lowest px-3 py-2.5">
                            <p class="font-label-sm text-label-sm text-on-surface-variant">${items.length} ${items.length === 1 ? "memory" : "memories"} · ${photos} photo${photos === 1 ? "" : "s"}</p>
                        </div>
                    </button>`;
            }).join("");
            recapSection.classList.remove("hidden");
            recapStrip.querySelectorAll("[data-recap]").forEach((btn) => btn.addEventListener("click", () => {
                activeCategory = "all";
                renderChips();
                renderFeed();
                openStory(btn.dataset.recap);
            }));
        }

        function renderFeed() {
            const items = visibleMemories();
            grid.innerHTML = items.length ? items.map(renderMemoryCard).join("") : renderEmptyMemories();
            grid.querySelectorAll("[data-open-story]").forEach((card) => {
                card.addEventListener("click", (event) => {
                    if (event.target.closest("[data-card-edit], [data-card-delete]")) return;
                    openStory(card.dataset.openStory);
                });
                card.addEventListener("keydown", (event) => {
                    if (event.key === "Enter" || event.key === " ") { event.preventDefault(); openStory(card.dataset.openStory); }
                });
            });
            grid.querySelectorAll("[data-card-edit]").forEach((btn) => btn.addEventListener("click", (event) => {
                event.stopPropagation();
                const m = allMemories().find((x) => x.id === btn.dataset.cardEdit);
                if (m) startEdit(m);
            }));
            grid.querySelectorAll("[data-card-delete]").forEach((btn) => btn.addEventListener("click", (event) => {
                event.stopPropagation();
                if (!confirm("Delete this memory?")) return;
                deleteMilestoneRemote(btn.dataset.cardDelete).catch((error) => showFeedback(error.message || "Could not delete memory."));
                milestonesCache = milestonesCache.filter((item) => item.id !== btn.dataset.cardDelete);
                renderAll();
                showFeedback("Memory deleted.");
            }));
            animateCards();
        }

        function renderMemoryCard(m) {
            const cat = CATEGORIES.find((c) => c.key === memoryCategory(m)) || CATEGORIES[CATEGORIES.length - 1];
            const notePreview = m.notes ? escapeHtml(m.notes) : "A small moment worth keeping close.";
            return `
                <div data-open-story="${m.id}" role="button" tabindex="0" aria-label="Open ${escapeHtml(m.title)} memory" class="milestone-card group relative block w-full text-left rounded-[30px] overflow-hidden shadow-[0_18px_50px_rgba(124,92,255,0.14)] cursor-pointer">
                    <div class="relative aspect-[4/5] w-full bg-gradient-to-br from-[#efe7ff] via-[#ffeef4] to-[#e6f6ff]">
                        ${m.photoUrl ? `<img class="w-full h-full object-cover" src="${m.photoUrl}" alt="">` : renderCardArt(cat)}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/65 via-black/5 to-black/10"></div>
                        <div class="absolute top-4 left-4 glass-tag px-3 py-1 rounded-full">
                            <span class="font-label-sm text-label-sm text-primary uppercase tracking-wide">${ageOf(m)}</span>
                        </div>
                        <div class="absolute top-3 right-3 flex gap-2">
                            <button class="glass-tag w-9 h-9 rounded-full flex items-center justify-center text-primary active:scale-90 transition-transform" data-card-edit="${m.id}" type="button" aria-label="Edit memory">
                                <span class="material-symbols-outlined text-[18px]">edit</span>
                            </button>
                            <button class="glass-tag w-9 h-9 rounded-full flex items-center justify-center text-error active:scale-90 transition-transform" data-card-delete="${m.id}" type="button" aria-label="Delete memory">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-5">
                            <span class="inline-flex items-center gap-1 rounded-full bg-white/85 px-2.5 py-0.5 mb-2 text-primary font-label-sm text-label-sm">
                                <span class="material-symbols-outlined text-[15px]">${cat.icon}</span>${cat.label}
                            </span>
                            <h3 class="font-display-lg text-display-lg text-white leading-[1.08] drop-shadow-sm">${escapeHtml(m.title)}</h3>
                            <p class="font-body-md text-body-md text-white/85 mt-1 line-clamp-2">${dateLabelOf(m)} · ${notePreview}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCardArt(cat) {
            return `<div class="w-full h-full flex items-center justify-center text-primary/55"><span class="material-symbols-outlined text-[72px]" style="font-variation-settings:'FILL' 1;">${cat.icon}</span></div>`;
        }

        function renderEmptyMemories() {
            const msg = activeCategory === "all"
                ? { title: "Your keepsake starts here", body: "Tiny moments count too. Add the first memory when it feels right." }
                : { title: "No memories here yet", body: "Capture this kind of moment and it will live here forever." };
            return `
                <div class="rounded-[30px] bg-surface-container-low p-8 text-center shadow-[0_12px_34px_rgba(124,92,255,0.1)]">
                    <div class="w-20 h-20 rounded-full bg-gradient-to-br from-[#efe7ff] to-[#ffeef4] text-primary mx-auto flex items-center justify-center mb-4">
                        <span class="material-symbols-outlined text-[42px]" style="font-variation-settings:'FILL' 1;">photo_album</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-1">${msg.title}</h3>
                    <p class="font-body-md text-body-md text-on-surface-variant">${msg.body}</p>
                </div>
            `;
        }

        function animateCards() {
            const cards = grid.querySelectorAll(".milestone-card");
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = "1";
                        entry.target.style.transform = "translateY(0)";
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });
            cards.forEach((card, index) => {
                card.style.opacity = "0";
                card.style.transform = "translateY(26px)";
                card.style.transition = `all 0.6s cubic-bezier(0.22, 1, 0.36, 1) ${index * 0.07}s`;
                observer.observe(card);
            });
        }

        function openStory(id) {
            storyOrder = visibleMemories().map((m) => m.id);
            storyIndex = Math.max(0, storyOrder.indexOf(id));
            storyModal.classList.remove("hidden");
            renderStory();
        }

        function stepStory(delta) {
            if (!storyOrder.length) return;
            storyIndex = (storyIndex + delta + storyOrder.length) % storyOrder.length;
            renderStory();
        }

        function closeStory() {
            storyModal.classList.add("hidden");
            storyBody.innerHTML = "";
        }

        function renderStory() {
            const m = allMemories().find((item) => item.id === storyOrder[storyIndex]);
            if (!m) { closeStory(); return; }
            const cat = CATEGORIES.find((c) => c.key === memoryCategory(m)) || CATEGORIES[CATEGORIES.length - 1];
            const multi = storyOrder.length > 1;
            storyPrevBtn.classList.toggle("hidden", !multi);
            storyNextBtn.classList.toggle("hidden", !multi);
            storyBody.innerHTML = `
                <div class="story-fade min-h-full flex flex-col">
                    <div class="relative w-full" style="height:60vh">
                        ${m.photoUrl
                            ? `<img class="w-full h-full object-cover" src="${m.photoUrl}" alt="">`
                            : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-[#cdbbf5] via-[#f3c9da] to-[#bfe3f5] text-white/80"><span class="material-symbols-outlined text-[96px]" style="font-variation-settings:'FILL' 1;">${cat.icon}</span></div>`}
                        <div class="absolute inset-0 bg-gradient-to-t from-[#18120f] via-[#18120f]/10 to-[#18120f]/35"></div>
                        <div class="absolute top-5 left-5 glass-tag px-3 py-1 rounded-full">
                            <span class="font-label-sm text-label-sm text-primary uppercase tracking-wide">${ageOf(m)}</span>
                        </div>
                    </div>
                    <div class="story-rise flex-1 -mt-12 rounded-t-[34px] bg-[#1f1714] px-6 pt-7 pb-12 text-white">
                        <p class="font-label-sm text-label-sm uppercase tracking-[0.18em] text-[#f7b89d]">${cat.label} · ${dateLabelOf(m)}</p>
                        <h2 class="font-display-lg text-display-lg leading-[1.06] mt-1">${escapeHtml(m.title)}</h2>
                        <p class="font-body-lg text-body-lg text-white/85 mt-4 leading-relaxed">${m.notes ? escapeHtml(m.notes) : "A quiet little moment, saved so it never fades."}</p>
                        <div class="flex flex-wrap gap-3 mt-8">
                            <button class="h-11 px-5 rounded-full bg-white text-[#1f1714] font-label-md text-label-md inline-flex items-center gap-2 active:scale-95 transition-transform" data-story-share="${m.id}" type="button"><span class="material-symbols-outlined text-[18px]">ios_share</span>Share</button>
                            <button class="h-11 px-5 rounded-full bg-white/12 text-white font-label-md text-label-md inline-flex items-center gap-2 active:scale-95 transition-transform" data-story-edit="${m.id}" type="button"><span class="material-symbols-outlined text-[18px]">edit</span>Edit</button>
                            <button class="h-11 px-5 rounded-full bg-white/12 text-[#ff9fb0] font-label-md text-label-md inline-flex items-center gap-2 active:scale-95 transition-transform" data-story-delete="${m.id}" type="button"><span class="material-symbols-outlined text-[18px]">delete</span>Delete</button>
                        </div>
                        ${multi ? `<p class="text-center text-white/40 font-label-sm text-label-sm mt-8">${storyIndex + 1} of ${storyOrder.length}</p>` : ""}
                    </div>
                </div>`;
            storyBody.scrollTop = 0;
            storyBody.querySelector("[data-story-share]")?.addEventListener("click", () => shareMemory(m));
            storyBody.querySelector("[data-story-edit]")?.addEventListener("click", () => { closeStory(); startEdit(m); });
            storyBody.querySelector("[data-story-delete]")?.addEventListener("click", () => {
                if (!confirm("Delete this memory?")) return;
                deleteMilestoneRemote(m.id).catch((error) => showFeedback(error.message || "Could not delete memory."));
                milestonesCache = milestonesCache.filter((item) => item.id !== m.id);
                closeStory();
                renderAll();
                showFeedback("Memory deleted.");
            });
        }

        function startEdit(m) {
            editingMilestoneId = m.id;
            const preset = [...typeInput.options].some((option) => option.value === m.title);
            typeInput.value = preset ? m.title : "Custom milestone";
            customTitleInput.value = preset ? "" : m.title;
            customTitleWrapper.classList.toggle("hidden", preset);
            dateInput.value = m.achievedAt;
            noteInput.value = m.notes || "";
            milestonePhotoDataUrl = m.photoUrl || "";
            photoLabel.textContent = milestonePhotoDataUrl ? "Photo ready" : "Add optional photo";
            saveButton.textContent = "Update memory";
            addPanel.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        async function shareMemory(m) {
            const text = `${selectedBaby?.name || "Baby"} — ${m.title} (${dateLabelOf(m)})${m.notes ? `\n${m.notes}` : ""}\nvia LittleNest MY`;
            try {
                if (navigator.share) { await navigator.share({ title: m.title, text }); return; }
                await navigator.clipboard.writeText(text);
                showFeedback("Memory copied to share.");
            } catch { /* user cancelled share */ }
        }

        function categoryForTitle(title) {
            const normalized = title.toLowerCase();
            if (normalized.includes("roll") || normalized.includes("step")) return "movement";
            if (normalized.includes("word") || normalized.includes("laugh")) return "communication";
            if (normalized.includes("tooth") || normalized.includes("food")) return "feeding";
            return "memory";
        }

        function showFeedback(message) {
            feedback.textContent = message;
            feedback.classList.remove("hidden");
            setTimeout(() => feedback.classList.add("hidden"), 2400);
        }

        function escapeHtml(value) {
            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>
<script type="module" src="/src/utils/navigation.mjs"></script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
