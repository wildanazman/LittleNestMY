<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "surface": "#fbf9f4",
          "surface-container": "#efeee9",
          "surface-container-low": "#f5f3ee",
          "surface-container-lowest": "#ffffff",
          "surface-container-highest": "#e4e2de",
          "primary": "#83533c",
          "primary-container": "#ffbfa3",
          "on-primary": "#ffffff",
          "on-primary-container": "#7a4b36",
          "on-surface": "#1b1c19",
          "on-surface-variant": "#51443e",
          "outline": "#84746d",
          "tertiary-container": "#b5d6af",
          "on-tertiary-container": "#415e3f"
        },
        fontFamily: {
          "headline-md": ["Nunito Sans"],
          "headline-lg": ["Nunito Sans"],
          "body-md": ["Nunito Sans"],
          "label-md": ["Nunito Sans"],

        }
      }

</script>
<style>
  body {
    background:
      radial-gradient(circle at 12% -8%, rgba(255,191,163,.46), transparent 34%),
      radial-gradient(circle at 92% 8%, rgba(181,214,175,.32), transparent 33%),
      linear-gradient(180deg, #fffaf6 0%, #fbf9f4 48%, #f2eee7 100%);
    font-family: 'Nunito Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    min-height: max(884px, 100dvh);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: .38;
    background-image:
      linear-gradient(rgba(131,83,60,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(131,83,60,.028) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: linear-gradient(to bottom, #000 0%, transparent 78%);
  }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-shadow { box-shadow: 0 22px 62px rgba(80,54,42,.10), inset 0 1px 0 rgba(255,255,255,.86); }
  .glass-shell {
    border: 1px solid rgba(255,255,255,.76);
    background: rgba(255,255,255,.78);
    box-shadow: 0 22px 62px rgba(80,54,42,.10), inset 0 1px 0 rgba(255,255,255,.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .baby-action {
    transition: transform 170ms cubic-bezier(.23,1,.32,1), background-color 180ms ease, box-shadow 180ms ease;
  }
  .baby-action:active { transform: scale(.975); }
  .delete-profile-action {
    background: #f9d4d7 !important;
    color: #8f1d18 !important;
    border: 1px solid rgba(179, 38, 30, .16) !important;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.72) !important;
  }
  .delete-profile-action:disabled {
    opacity: .72;
    color: #8f1d18 !important;
  }
  .preterm-summary {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: start;
    border: 1px solid rgba(65, 94, 63, .18);
    background: #edf6eb;
    border-radius: 18px;
    padding: 12px;
  }
  .preterm-summary__icon {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #dbeed8;
    color: #415e3f;
  }
  .preterm-summary__label {
    font-size: 11px;
    line-height: 14px;
    font-weight: 800;
    color: rgba(47, 79, 48, .74);
  }
  .preterm-summary__value {
    font-size: 14px;
    line-height: 18px;
    font-weight: 800;
    color: #203f22;
  }
  .preterm-summary__meta {
    margin-top: 2px;
    font-size: 12px;
    line-height: 16px;
    font-weight: 700;
    color: rgba(47, 79, 48, .72);
  }
  .preterm-summary__chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,.72);
    padding: 4px 8px;
    font-size: 11px;
    line-height: 14px;
    font-weight: 800;
    color: #415e3f;
  }
  @media (hover:hover) and (pointer:fine) {
    .baby-action:hover { transform: translateY(-1px); box-shadow: inset 0 0 0 1px rgba(131,83,60,.06); }
    .delete-profile-action:hover {
      background: #f4bfc4 !important;
      box-shadow: inset 0 0 0 1px rgba(179,38,30,.18) !important;
    }
  }
  header {
    top: max(10px, env(safe-area-inset-top));
    width: calc(100% - 28px);
    max-width: 448px;
    margin: 0 auto;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.78);
    background: rgba(255,250,246,.90) !important;
    box-shadow: 0 18px 48px rgba(80,54,42,.10), inset 0 1px 0 rgba(255,255,255,.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  nav.fixed {
    width: calc(100% - 28px) !important;
    max-width: 448px;
    left: 50% !important;
    right: auto !important;
    transform: translateX(-50%);
    bottom: max(10px, env(safe-area-inset-bottom)) !important;
    border-radius: 28px !important;
    border: 1px solid rgba(255,255,255,.78);
    background: rgba(255,255,255,.88) !important;
    box-shadow: 0 18px 48px rgba(80,54,42,.14), inset 0 1px 0 rgba(255,255,255,.92) !important;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  :root.dark .preterm-summary {
    background: rgba(72, 102, 70, .20);
    border-color: rgba(154, 240, 188, .18);
  }
  :root.dark .preterm-summary__icon {
    background: rgba(154, 240, 188, .16);
    color: #9af0bc;
  }
  :root.dark .preterm-summary__label,
  :root.dark .preterm-summary__meta {
    color: rgba(223, 247, 223, .72);
  }
  :root.dark .preterm-summary__value {
    color: #f1fff0;
  }
  :root.dark .preterm-summary__chip {
    background: rgba(255,255,255,.10);
    color: #9af0bc;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 1ms !important; animation-duration: 1ms !important; }
  }
</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<header class="bg-surface sticky z-40 flex items-center justify-between px-3 h-14 mt-2">
  <div class="flex items-center gap-3">
    <button aria-label="Back to settings" class="baby-action w-10 h-10 rounded-full flex items-center justify-center text-primary active:scale-95 transition-transform" id="backButton" type="button">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="font-headline-lg text-[24px] leading-8 font-bold text-primary">Baby Profiles</h1>
  </div>
</header>

<main class="max-w-md mx-auto px-5 pt-7 space-y-5">
  <section class="glass-shell rounded-[32px] p-2">
    <div class="relative overflow-hidden rounded-[26px] bg-white/62 p-4 border border-white/70">
      <div class="absolute -top-10 -right-8 w-32 h-32 rounded-full bg-primary-container/40 blur-2xl pointer-events-none"></div>
      <div class="relative flex items-start gap-3">
      <div class="w-12 h-12 rounded-[18px] bg-primary-container text-on-primary-container flex items-center justify-center shrink-0 soft-shadow">
        <span class="material-symbols-outlined">child_care</span>
      </div>
      <div>
        <p class="text-[10px] font-extrabold uppercase tracking-[0.16em] text-primary/70">Baby profiles</p>
        <h2 class="font-headline-md text-[20px] leading-7 font-bold">Manage your little ones</h2>
        <p class="font-body-md text-[15px] leading-6 text-on-surface-variant">View, edit, add, and switch baby profiles without losing existing logs.</p>
      </div>
    </div>
    </div>
  </section>

  <p class="hidden rounded-[22px] bg-tertiary-container text-on-tertiary-container p-3 font-label-md text-[14px] soft-shadow" id="feedback" aria-live="polite"></p>

  <section class="space-y-3" id="profilesList"></section>

  <button class="baby-action w-full h-14 rounded-[22px] bg-primary text-on-primary font-headline-md text-[18px] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform soft-shadow" id="addBabyButton" type="button">
    <span class="material-symbols-outlined">add</span>
    Add New Baby
  </button>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-4 pt-2 bg-surface-container-highest shadow-[0_-4px_12px_rgba(255,191,163,0.15)] rounded-t-xl">
  <button><span class="material-symbols-outlined">home</span><span>Home</span></button>
  <button><span class="material-symbols-outlined">add_circle</span><span>Log</span></button>
  <button><span class="material-symbols-outlined">calendar_month</span><span>Calendar</span></button>
  <button><span class="material-symbols-outlined">auto_awesome</span><span>Milestones</span></button>
  <button><span class="material-symbols-outlined">smart_toy</span><span>Assistant</span></button>
</nav>

<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile: mockBabyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { calculateBabyAge, profileAgeDisplay } = await import(`${moduleBase}utils/dateFormat.mjs`);
  const {
    getLogsForBaby,
    getPersistedGrowthRecords
  } = await import(`${moduleBase}utils/localState.mjs`);
  const { deleteBabyProfileRemote, loadBabyProfilesRemote, setSelectedBabyIdRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { goToScreen, goBackOrTo, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);
  const { getBabyPermissions, viewOnlyMessage } = await import(`${moduleBase}utils/permissions.mjs`);

  const profilesList = document.getElementById("profilesList");
  const feedback = document.getElementById("feedback");

  document.getElementById("backButton").addEventListener("click", () => goBackOrTo("settings"));
  document.getElementById("addBabyButton").addEventListener("click", async () => {
    const babyState = await loadBabyProfilesRemote(mockBabyProfile);
    const permissions = await getBabyPermissions(babyState.selectedBabyId);
    if (babyState.profiles.length && !permissions.canManageBaby) {
      showFeedback(viewOnlyMessage);
      return;
    }
    window.location.href = `${screenUrl("add_baby_profile")}?mode=create`;
  });

  render();

  async function render() {
    profilesList.innerHTML = renderLoadingState();
    const babyState = await loadBabyProfilesRemote(mockBabyProfile);
    const profiles = babyState.profiles;
    const selectedBabyId = babyState.selectedBabyId;
    const permissions = await getBabyPermissions(selectedBabyId);
    const canManageBaby = permissions.canManageBaby || profiles.length === 0;
    if (babyState.error) showFeedback(babyState.error);

    profilesList.innerHTML = profiles.length
      ? profiles.map((profile) => renderProfileCard(profile, profile.id === selectedBabyId, profiles.length, canManageBaby)).join("")
      : renderEmptyState();
    document.getElementById("addBabyButton").classList.toggle("hidden", profiles.length > 0 && !canManageBaby);
    if (profiles.length > 0 && !canManageBaby) showFeedback("View-only access");

    profilesList.querySelectorAll("[data-edit-baby]").forEach((button) => {
      button.addEventListener("click", () => {
        window.location.href = `${screenUrl("add_baby_profile")}?mode=edit&id=${encodeURIComponent(button.dataset.editBaby)}`;
      });
    });

    profilesList.querySelectorAll("[data-switch-baby]").forEach((button) => {
      button.addEventListener("click", () => {
        if (profiles.length < 2) {
          showFeedback("Only one baby profile for now. Add another baby to switch.");
          return;
        }
        setSelectedBabyIdRemote(button.dataset.switchBaby);
        showFeedback("Current baby updated.");
        render();
      });
    });

    profilesList.querySelectorAll("[data-delete-baby]").forEach((button) => {
      button.addEventListener("click", async () => {
        const babyName = button.dataset.babyName || "this baby";
        if (profiles.length < 2) {
          showFeedback("Add another baby before deleting this profile.");
          return;
        }
        if (!confirm(`Delete ${babyName}'s profile? This removes the baby profile, but existing local logs are not cleared.`)) return;
        button.disabled = true;
        try {
          await deleteBabyProfileRemote(button.dataset.deleteBaby, mockBabyProfile);
          showFeedback("Baby profile deleted.");
          render();
        } catch (error) {
          showFeedback(error.message || "Could not delete baby profile.");
          button.disabled = false;
        }
      });
    });
  }

  function renderProfileCard(profile, isSelected, totalProfiles, canManageBaby) {
    const ageDisplay = profileAgeDisplay(profile, new Date());
    const age = ageDisplay.actual;
    const correctedNote = ageDisplay.corrected
      ? `<div class="preterm-summary">
          <span class="preterm-summary__icon"><span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">child_care</span></span>
          <div class="min-w-0">
            <p class="preterm-summary__label">Preterm tracking</p>
            <p class="preterm-summary__value">Corrected age: ${escapeHtml(ageDisplay.corrected)}</p>
            <p class="preterm-summary__meta">Born age: ${escapeHtml(ageDisplay.actual)}</p>
            <span class="preterm-summary__chip"><span class="material-symbols-outlined text-[13px]">timeline</span> Growth and milestones use corrected age</span>
          </div>
        </div>`
      : ageDisplay.showNote ? '<div class="rounded-2xl bg-[#fff3da]/60 border border-[#fcd34d]/30 p-3 flex items-start gap-2.5"><span class="material-symbols-outlined text-[20px] text-[#b45309] shrink-0 mt-0.5">info</span><div class="min-w-0"><p class="font-label-md text-[13px] font-bold text-[#92400e]">Add EDD or gestational age</p><p class="font-label-sm text-[11px] text-[#92400e]/70 mt-0.5">For accurate corrected age tracking.</p></div></div>' : '';
    const latestGrowth = getLatestGrowthForBaby(profile.id);
    const bloodGroup = formatBloodGroup(profile);
    const dob = new Date(`${profile.dateOfBirth}T00:00:00`).toLocaleDateString("en-MY", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });
    const photo = profile.photoUrl || "/icons/placeholder.svg";

    return `
      <article class="glass-shell rounded-[32px] p-2 ${isSelected ? "ring-2 ring-primary-container/70" : ""} space-y-0">
        <div class="rounded-[26px] bg-white/64 border border-white/70 p-4 space-y-4">
        <div class="flex gap-4">
          <div class="w-[72px] h-[72px] rounded-[24px] overflow-hidden bg-surface-container shrink-0 border-4 border-white soft-shadow">
            <img class="w-full h-full object-cover" src="${escapeHtml(photo)}" alt="${escapeHtml(profile.name)} profile photo"/>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2 flex-wrap">
              <h2 class="font-headline-md text-[20px] leading-7 font-bold truncate">${escapeHtml(profile.name)}</h2>
              ${isSelected ? '<span class="rounded-full bg-primary-container text-on-primary-container px-2.5 py-1 text-[11px] font-extrabold">Current</span>' : ""}
            </div>
            <p class="font-body-md text-[15px] text-on-surface-variant">${ageDisplay.corrected ? `Corrected age: ${escapeHtml(ageDisplay.corrected)}` : escapeHtml(age)}</p>
            <p class="font-label-sm text-[12px] text-outline">Born ${dob}${bloodGroup ? ` · ${escapeHtml(bloodGroup)}` : ""}</p>
          </div>
        </div>
        ${correctedNote ? correctedNote : ""}
        <button class="baby-action w-full rounded-[22px] bg-surface-container-low/80 p-3 text-left border border-white/60 flex items-center justify-between gap-3" data-growth-baby="${escapeHtml(profile.id)}" type="button">
          <span>
            <p class="font-label-sm text-[12px] text-on-surface-variant">Latest growth</p>
            <p class="font-label-md text-[14px] text-on-surface">${escapeHtml(latestGrowth)}</p>
          </span>
          <span class="material-symbols-outlined text-primary">monitoring</span>
        </button>
        <div class="grid ${isSelected || !canManageBaby ? "grid-cols-1" : "grid-cols-2"} gap-2">
          ${canManageBaby ? `<button class="baby-action h-11 rounded-[18px] bg-surface-container-low text-primary font-label-md text-[14px] font-bold" data-edit-baby="${escapeHtml(profile.id)}" type="button">Edit profile</button>` : `<p class="h-11 rounded-[18px] bg-surface-container-low text-on-surface-variant font-label-md text-[14px] font-bold flex items-center justify-center">View-only access</p>`}
          ${isSelected ? "" : `<button class="baby-action h-11 rounded-[18px] bg-primary-container text-on-primary-container font-label-md text-[14px] font-bold" data-switch-baby="${escapeHtml(profile.id)}" type="button">Switch baby</button>`}
        </div>
        ${canManageBaby && totalProfiles > 1 ? `<button class="baby-action delete-profile-action w-full h-10 rounded-[18px] font-label-md text-[13px] font-extrabold active:scale-95 transition-transform" data-delete-baby="${escapeHtml(profile.id)}" data-baby-name="${escapeHtml(profile.name)}" type="button">Delete profile</button>` : ""}
        ${isSelected && totalProfiles < 2 ? '<button class="baby-action w-full h-10 rounded-[18px] bg-surface-container text-on-surface-variant font-label-md text-[13px]" data-switch-baby="' + escapeHtml(profile.id) + '" type="button">Switch baby</button>' : ""}
        </div>
      </article>
    `;
  }

  profilesList.addEventListener("click", (event) => {
    const growthButton = event.target.closest("[data-growth-baby]");
    if (!growthButton) return;
    setSelectedBabyIdRemote(growthButton.dataset.growthBaby);
    goToScreen("growth_tracker");
  });

  function getLatestGrowthForBaby(babyId) {
    const latest = getLogsForBaby(getPersistedGrowthRecords([]), babyId)
      .sort((a, b) => new Date(b.measuredAt) - new Date(a.measuredAt))[0];
    if (!latest) return "No growth records yet";
    const height = latest.heightCm || latest.lengthCm;
    return [
      latest.weightKg ? `${latest.weightKg} kg` : "",
      height ? `${height} cm` : "",
      latest.headCircumferenceCm ? `${latest.headCircumferenceCm} cm head` : ""
    ].filter(Boolean).join(" / ") || "Measurement saved";
  }

  function formatBloodGroup(profile) {
    if (!profile?.bloodType) return "";
    const rh = profile.rhesusFactor === "positive" ? "+" : profile.rhesusFactor === "negative" ? "-" : "";
    return `${profile.bloodType}${rh}`;
  }

  function renderEmptyState() {
    return `
      <div class="glass-shell rounded-[32px] p-6 text-center space-y-3">
        <div class="w-16 h-16 rounded-[22px] bg-primary-container/50 text-primary mx-auto flex items-center justify-center soft-shadow">
          <span class="material-symbols-outlined text-[34px]">child_care</span>
        </div>
        <p class="font-headline-md text-[20px] font-bold">No baby profile yet</p>
        <p class="font-body-md text-[15px] text-on-surface-variant">Create one now, or wait here for a baby invitation.</p>
      </div>
    `;
  }

  function renderLoadingState() {
    return `
      <div class="glass-shell rounded-[32px] p-6 text-center space-y-3">
        <div class="w-16 h-16 rounded-[22px] bg-primary-container/50 text-primary mx-auto flex items-center justify-center soft-shadow">
          <span class="material-symbols-outlined text-[34px] animate-pulse">sync</span>
        </div>
        <p class="font-headline-md text-[20px] font-bold">Loading baby profiles...</p>
        <p class="font-body-md text-[15px] text-on-surface-variant">Checking your synced baby profiles.</p>
      </div>
    `;
  }

  function showFeedback(message) {
    feedback.textContent = message;
    feedback.classList.remove("hidden");
    setTimeout(() => feedback.classList.add("hidden"), 2600);
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
</script>
<script type="module" src="/src/utils/navigation.mjs"></script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
