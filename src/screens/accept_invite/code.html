<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#ffbfa3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/src/utils/pwa-safe-area.css"/>
<link rel="stylesheet" href="/src/utils/theme.css"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Accept Family Invite - LittleNest MY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        surface: "#fff8f5",
        "surface-container": "#f4ebe6",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        tertiary: "#486646",
        "tertiary-container": "#b5d6af",
        error: "#ba1a1a"
      },
      fontFamily: { body: ["Nunito Sans", "sans-serif"] }
    }
  }
};
</script>
<style>.soft-shadow{box-shadow:0 18px 45px rgba(131,83,60,.12)}</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<main class="min-h-screen px-6 py-8 max-w-md mx-auto flex flex-col justify-center">
<section class="rounded-[32px] bg-surface-container-lowest p-6 soft-shadow border border-white/70 space-y-5 text-center">
<div class="w-20 h-20 rounded-3xl bg-primary-container text-on-primary-container mx-auto flex items-center justify-center">
<span class="material-symbols-outlined text-[44px]">diversity_1</span>
</div>
<div class="space-y-2">
<p class="text-sm font-extrabold uppercase tracking-wide text-primary">LittleNest MY</p>
<h1 class="text-3xl font-extrabold text-primary leading-tight">Join this care circle</h1>
<p class="text-base leading-6 text-on-surface-variant" id="inviteMessage">Checking your invitation...</p>
</div>
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-extrabold active:scale-[0.98] transition-transform" id="acceptButton" type="button">Accept Invite</button>
<button class="w-full h-12 rounded-full bg-surface-container text-primary font-bold active:scale-[0.98] transition-transform" id="loginButton" type="button">Log In / Create Account</button>
<p class="text-sm text-error hidden" id="inviteError" aria-live="polite"></p>
</section>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { acceptFamilyInviteRemote } = await import(`${moduleBase}utils/familyInvitesRemote.mjs`);
  const { setSelectedBabyIdRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { isLoggedIn } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token") || params.get("invite_token") || "";
  const message = document.getElementById("inviteMessage");
  const error = document.getElementById("inviteError");
  const acceptButton = document.getElementById("acceptButton");

  if (!token) {
    showError("This invite link is missing a token.");
    acceptButton.disabled = true;
  } else if (!(await isLoggedIn())) {
    message.textContent = "Log in or create an account with the invited email, then return to this invite link.";
  } else {
    message.textContent = "You're signed in. Tap accept to join the care circle.";
  }

  document.getElementById("loginButton").addEventListener("click", () => {
    window.location.href = screenUrl("login");
  });

  acceptButton.addEventListener("click", async () => {
    if (!token) return;
    acceptButton.disabled = true;
    acceptButton.textContent = "Accepting...";
    error.classList.add("hidden");
    try {
      const result = await acceptFamilyInviteRemote(token);
      setSelectedBabyIdRemote(result.babyId);
      message.textContent = "Invite accepted. Welcome to the care circle.";
      acceptButton.textContent = "Opening Home...";
      setTimeout(() => window.location.href = screenUrl("home_dashboard"), 700);
    } catch (inviteError) {
      showError(inviteError.message || "Could not accept invite.");
      acceptButton.disabled = false;
      acceptButton.textContent = "Accept Invite";
    }
  });

  function showError(text) {
    error.textContent = text;
    error.classList.remove("hidden");
    message.textContent = "We could not complete this invite yet.";
  }
</script>
</body></html>
