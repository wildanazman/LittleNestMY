<script type="module">
const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
const { babyProfile, feedingLogs: mockFeedingLogs } = await import(`${moduleBase}data/mockData.mjs`);
const { getLogsForBaby, getPersistedFeedingLogs } = await import(`${moduleBase}utils/localState.mjs`);
const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
const { deleteFeedingLogRemote, loadCoreLogsRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
const { goBackOrTo } = await import(`${moduleBase}utils/prototypeUi.mjs`);
const { formatDuration, formatTime } = await import(`${moduleBase}utils/dateFormat.mjs`);

const state = { typeFilter: "all", dateFilter: "", searchFilter: "" };
const babyState = await loadBabyProfilesRemote(babyProfile);
const selectedBabyId = babyState.selectedBabyId;
let feedingLogItems = [];

const loadingSkeleton = document.getElementById("loadingSkeleton");
const mainContent = document.getElementById("mainContent");
const feedList = document.getElementById("feedList");
const statsTotalFeeds = document.getElementById("statsTotalFeeds");
const statsTotalAmount = document.getElementById("statsTotalAmount");
const statsLastFeed = document.getElementById("statsLastFeed");
const filterDateInput = document.getElementById("filterDateInput");
const filterSearchInput = document.getElementById("filterSearchInput");
const backButton = document.getElementById("historyBackButton");

backButton.addEventListener("click", () => goBackOrTo("quick_log"));
filterDateInput.addEventListener("change", () => { state.dateFilter = filterDateInput.value; renderFeedList(); });
filterSearchInput.addEventListener("input", () => { state.searchFilter = filterSearchInput.value; renderFeedList(); });

document.querySelectorAll("[data-type-filter]").forEach((chip) => {
chip.addEventListener("click", () => {
document.querySelectorAll("[data-type-filter]").forEach((c) => c.classList.remove("is-active"));
chip.classList.add("is-active");
state.typeFilter = chip.dataset.typeFilter;
renderFeedList();
});
});

filterDateInput.value = "";

await refreshLogs();

loadingSkeleton.classList.add("hidden");
mainContent.classList.remove("hidden");

async function refreshLogs() {
const result = await loadCoreLogsRemote(selectedBabyId, { feedingLogs: mockFeedingLogs });
feedingLogItems = dedupeFeedingLogs(result.feedingLogs || []);
computeStats();
renderFeedList();
}

function computeStats() {
const today = new Date();
const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
const todayEnd = new Date(todayStart.getTime() + 86400000);

const todayLogs = feedingLogItems.filter((log) => {
const logDate = new Date(log.startedAt);
return logDate >= todayStart && logDate < todayEnd;
});

statsTotalFeeds.textContent = todayLogs.length;

let totalMl = 0;
todayLogs.forEach((log) => {
if (log.amountMl) totalMl += log.amountMl;
if (log.amountGrams) totalMl += log.amountGrams;
});
statsTotalAmount.textContent = totalMl > 0 ? `${totalMl} ml` : "0 ml";

const sorted = [...todayLogs].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));
statsLastFeed.textContent = sorted.length > 0 ? formatTime(sorted[0].startedAt) : "--";
}

function renderFeedList() {
const filtered = getFilteredLogs().sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));

if (filtered.length === 0) {
feedList.innerHTML = `
<div class="bg-surface-container-lowest p-6 rounded-3xl custom-shadow border border-primary-container/30 text-center space-y-3">
<div class="w-16 h-16 rounded-full bg-primary-container/40 text-primary mx-auto flex items-center justify-center">
<span class="material-symbols-outlined text-[34px]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div>
<p class="font-headline-md text-headline-md text-on-surface">No feeding logs found</p>
<p class="font-body-md text-body-md text-on-surface-variant">Try adjusting your filters or log a new feed.</p>
</div>
</div>`;
return;
}

feedList.innerHTML = filtered.map(renderCard).join("");
bindCardActions();
}

function getFilteredLogs() {
return feedingLogItems.filter((log) => {
if (state.typeFilter !== "all" && log.type !== state.typeFilter) return false;
if (state.dateFilter) {
const logDate = new Date(log.startedAt);
const filterDate = new Date(state.dateFilter + "T00:00:00");
if (logDate.toDateString() !== filterDate.toDateString()) return false;
}
if (state.searchFilter) {
const q = state.searchFilter.toLowerCase();
const label = labelForType(log.type).toLowerCase();
const notes = (log.notes || "").toLowerCase();
const food = (log.foodName || "").toLowerCase();
if (!label.includes(q) && !notes.includes(q) && !food.includes(q)) return false;
}
return true;
});
}

function renderCard(log) {
const amount = log.amountGrams
? `${log.amountGrams} g`
: log.amountMl
? `${log.amountMl} ml`
: log.durationMinutes
? formatDuration(log.durationMinutes)
: log.endedAt
? formatDuration(Math.round((new Date(log.endedAt) - new Date(log.startedAt)) / 60000))
: "Logged";

return `
<div class="bg-surface-container-lowest p-4 rounded-3xl custom-shadow flex items-center justify-between group transition-all">
<div class="flex items-center gap-4 min-w-0">
<div class="w-12 h-12 rounded-2xl ${iconTone(log.type)} flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">${iconForType(log.type)}</span>
</div>
<div class="min-w-0">
<p class="font-label-md text-label-md text-on-surface truncate">${labelForType(log.type)}${log.foodName ? ` &middot; ${escapeHtml(log.foodName)}` : ""}${log.brand ? ` &middot; ${escapeHtml(log.brand)}` : ""}</p>
<p class="font-body-md text-label-sm text-on-surface-variant">${relativeDay(log.startedAt)} &middot; ${formatTime(log.startedAt)}</p>
${log.notes ? `<p class="font-body-md text-label-sm text-on-surface-variant truncate">${escapeHtml(log.notes)}</p>` : ""}
</div>
</div>
<div class="text-right shrink-0 pl-3">
<p class="font-headline-md text-headline-md text-primary">${amount}</p>
<button class="mt-1 text-label-sm text-error opacity-0 group-hover:opacity-100 transition-opacity" data-delete-feed="${log.id}" type="button">Delete</button>
</div>
</div>`;
}

function bindCardActions() {
feedList.querySelectorAll("[data-delete-feed]").forEach((button) => {
button.addEventListener("click", async () => {
if (!confirm("Delete this feeding log?")) return;
try {
await deleteFeedingLogRemote(button.dataset.deleteFeed);
} catch (err) {
/* proceed with local removal */
}
await refreshLogs();
});
});
}

function labelForType(type) {
return {
breast: "Breastfeeding",
bottle: "Bottle feeding",
formula: "Formula feeding",
solid: "Solid food"
}[type] || "Feeding";
}

function iconForType(type) {
return {
breast: "child_care",
bottle: "local_drink",
formula: "blender",
solid: "restaurant"
}[type] || "local_drink";
}

function iconTone(type) {
return type === "formula"
? "bg-tertiary-container/30 text-tertiary"
: type === "solid"
? "bg-secondary-container/50 text-secondary"
: "bg-primary-container/30 text-primary";
}

function relativeDay(dateTime) {
const date = new Date(dateTime);
const today = new Date();
const yesterday = new Date();
yesterday.setDate(today.getDate() - 1);

if (date.toDateString() === today.toDateString()) return "Today";
if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
return date.toLocaleDateString("en-MY", { day: "numeric", month: "short" });
}

function escapeHtml(value) {
return value
.replaceAll("&", "&amp;")
.replaceAll("<", "&lt;")
.replaceAll(">", "&gt;")
.replaceAll('"', "&quot;")
.replaceAll("'", "&#039;");
}

function dedupeFeedingLogs(logs) {
const bySignature = new Map();
(logs || []).forEach((log) => {
const signature = [
log.babyId || "",
log.type || "",
minuteKey(log.startedAt),
log.amountMl || "",
log.amountGrams || "",
log.durationMinutes || "",
log.notes || ""
].join("|");
const existing = bySignature.get(signature);
if (!existing || (isUuid(log.id) && !isUuid(existing.id))) {
bySignature.set(signature, log);
}
});
return [...bySignature.values()];
}

function isUuid(value) {
return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || ""));
}

function minuteKey(value) {
if (!value) return "";
const date = new Date(value);
if (Number.isNaN(date.getTime())) return String(value);
date.setSeconds(0, 0);
return date.toISOString();
}
</script>
