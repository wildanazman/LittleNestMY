<script type="module">
const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
const { babyProfile, diaperLogs: mockDiaperLogs } = await import(`${moduleBase}data/mockData.mjs`);
const { getLogsForBaby, getPersistedDiaperLogs } = await import(`${moduleBase}utils/localState.mjs`);
const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
const { deleteDiaperLogRemote, loadCoreLogsRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
const { goToScreen } = await import(`${moduleBase}utils/prototypeUi.mjs`);
const { formatTime, isSameLocalDay } = await import(`${moduleBase}utils/dateFormat.mjs`);

const state = {
  logs: [],
  filteredLogs: [],
  typeFilter: "",
  dateFilter: "",
  searchFilter: "",
  now: new Date()
};

const skeleton = document.getElementById("loadingSkeleton");
const mainContent = document.getElementById("mainContent");
const historyList = document.getElementById("diaperHistoryList");
const todayCount = document.getElementById("todayCount");
const diaperCount = document.getElementById("diaperCount");
const resultCount = document.getElementById("resultCount");
const dateFilterInput = document.getElementById("dateFilterInput");
const searchFilterInput = document.getElementById("searchFilterInput");
const typeChips = [...document.querySelectorAll("[data-type-filter]")];

const babyState = await loadBabyProfilesRemote(babyProfile);
const selectedBabyId = babyState.selectedBabyId;

const localLogs = getLogsForBaby(getPersistedDiaperLogs(mockDiaperLogs), selectedBabyId);
const result = await loadCoreLogsRemote(selectedBabyId, { diaperLogs: mockDiaperLogs });
state.logs = (result.diaperLogs || localLogs)
  .sort((a, b) => new Date(b.changedAt) - new Date(a.changedAt));

dateFilterInput.value = localDateValue(state.now);

applyFilters();

skeleton.classList.add("hidden");
mainContent.classList.remove("hidden");

typeChips.forEach((chip) => {
  chip.addEventListener("click", () => {
    state.typeFilter = chip.dataset.typeFilter;
    typeChips.forEach((c) => {
      c.classList.toggle("filter-chip-active", c === chip);
      c.classList.toggle("text-on-surface-variant", c !== chip);
      c.classList.toggle("text-on-surface", c === chip);
    });
    applyFilters();
  });
});

dateFilterInput.addEventListener("change", () => {
  state.dateFilter = dateFilterInput.value;
  applyFilters();
});

searchFilterInput.addEventListener("input", () => {
  state.searchFilter = searchFilterInput.value.trim().toLowerCase();
  applyFilters();
});

document.getElementById("backButton").addEventListener("click", () => goToScreen("diaper_log"));

function applyFilters() {
  state.filteredLogs = state.logs.filter((log) => {
    if (state.typeFilter && normalizeDiaperType(log.type) !== state.typeFilter) return false;
    if (state.dateFilter) {
      const logDate = localDateValue(new Date(log.changedAt));
      if (logDate !== state.dateFilter) return false;
    }
    if (state.searchFilter) {
      const searchable = [log.notes, log.brand, log.color, log.peeColor, log.poopColor, log.peeColorOther, log.poopColorOther]
        .filter(Boolean).join(" ").toLowerCase();
      if (!searchable.includes(state.searchFilter)) return false;
    }
    return true;
  });
  renderStats();
  renderList();
}

function renderStats() {
  const todayLogs = state.logs.filter((log) => isSameLocalDay(log.changedAt, state.now));
  const wetCount = todayLogs.filter((log) => normalizeDiaperType(log.type) === "pee").length;
  const poopCount = todayLogs.filter((log) => normalizeDiaperType(log.type) === "poop").length;
  const mixedCount = todayLogs.filter((log) => normalizeDiaperType(log.type) === "mixed").length;
  const brands = new Set(todayLogs.map((log) => (log.brand || "").trim()).filter(Boolean));
  const uniqueBrands = [...brands];

  todayCount.textContent = todayLogs.length;
  diaperCount.textContent = uniqueBrands.length > 0 ? uniqueBrands.length : todayLogs.length;

  const breakdown = document.getElementById("statsBar").querySelector(".flex.justify-around");
  if (breakdown) {
    breakdown.innerHTML = `
      <div class="text-center">
        <p class="font-label-lg text-label-lg font-bold text-[#0369A1]">${wetCount}</p>
        <p class="font-label-sm text-label-sm text-on-surface-variant">Wet</p>
      </div>
      <div class="text-center">
        <p class="font-label-lg text-label-lg font-bold text-primary">${poopCount}</p>
        <p class="font-label-sm text-label-sm text-on-surface-variant">Poop</p>
      </div>
      <div class="text-center">
        <p class="font-label-lg text-label-lg font-bold text-tertiary">${mixedCount}</p>
        <p class="font-label-sm text-label-sm text-on-surface-variant">Mixed</p>
      </div>
    `;
  }
}

function renderList() {
  const filtered = state.filteredLogs;

  resultCount.textContent = filtered.length === state.logs.length
    ? `${filtered.length} log${filtered.length === 1 ? "" : "s"}`
    : `${filtered.length} of ${state.logs.length} log${state.logs.length === 1 ? "" : "s"}`;

  if (!filtered.length) {
    historyList.innerHTML = `
      <div class="bg-surface-container-lowest rounded-2xl p-6 soft-shadow border border-tertiary-container/30 text-center space-y-3">
        <div class="w-16 h-16 rounded-full bg-tertiary-container/40 text-tertiary mx-auto flex items-center justify-center">
          <span class="material-symbols-outlined text-[34px]">baby_changing_station</span>
        </div>
        <div>
          <p class="font-headline-md text-headline-md text-on-surface">No diaper logs found</p>
          <p class="font-body-md text-body-md text-on-surface-variant">Try adjusting your filters or log a new change.</p>
        </div>
      </div>
    `;
    return;
  }

  historyList.innerHTML = filtered.map(renderCard).join("");
  bindDeleteButtons();
}

function renderCard(log) {
  const type = normalizeDiaperType(log.type);
  const typeLabel = labelForType(type);
  const detail = diaperSummary(log);
  return `
    <div class="diaper-card bg-surface-container-lowest rounded-2xl p-4 soft-shadow border border-surface-container-high flex items-start gap-3">
      <div class="w-11 h-11 rounded-2xl ${toneForType(type)} flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">baby_changing_station</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <p class="font-label-md text-label-md text-on-surface">${escapeHtml(typeLabel)} Diaper</p>
            <p class="font-label-sm text-label-sm text-on-surface-variant">${relativeDay(log.changedAt)} · ${formatTime(log.changedAt)}</p>
          </div>
          <button class="delete-btn shrink-0 w-8 h-8 flex items-center justify-center rounded-full text-error hover:bg-error-container/50 transition-colors" data-delete-diaper="${escapeHtml(log.id)}" type="button" aria-label="Delete diaper log">
            <span class="material-symbols-outlined text-[20px]">delete</span>
          </button>
        </div>
        ${detail ? `<p class="font-body-md text-body-md text-on-surface-variant mt-1">${escapeHtml(detail)}</p>` : ""}
        ${(log.brand || log.rash) ? `<div class="flex flex-wrap items-center gap-1 mt-2">${log.brand ? `<span class="brand-pill"><span class="material-symbols-outlined text-[12px]">label</span>${escapeHtml(log.brand)}</span>` : ""}${log.rash ? `<span class="rash-badge"><span class="material-symbols-outlined text-[12px]">healing</span>Rash</span>` : ""}</div>` : ""}
        ${log.notes ? `<p class="font-label-sm text-label-sm text-on-surface-variant mt-1.5 line-clamp-2">${escapeHtml(log.notes)}</p>` : ""}
      </div>
    </div>
  `;
}

function bindDeleteButtons() {
  historyList.querySelectorAll("[data-delete-diaper]").forEach((button) => {
    button.addEventListener("click", async (event) => {
      event.stopPropagation();
      if (!confirm("Delete this diaper log?")) return;
      try {
        await deleteDiaperLogRemote(button.dataset.deleteDiaper);
      } catch (error) {
        console.warn("Delete sync failed, removed locally.", error);
      }
      state.logs = state.logs.filter((log) => log.id !== button.dataset.deleteDiaper);
      applyFilters();
    });
  });
}

function labelForType(type) {
  return { pee: "Wet", poop: "Poop", mixed: "Mixed" }[type] || "Diaper";
}

function normalizeDiaperType(type) {
  if (type === "wet") return "pee";
  if (type === "dirty") return "poop";
  return type || "mixed";
}

function toneForType(type) {
  return type === "pee"
    ? "bg-[#E0F2FE] text-[#0369A1]"
    : type === "poop"
      ? "bg-primary-container/30 text-primary"
      : "bg-tertiary-container/40 text-tertiary";
}

function relativeDay(dateTime) {
  const date = new Date(dateTime);
  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);
  if (date.toDateString() === today.toDateString()) return "Today";
  if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
  return date.toLocaleDateString("en-MY", { day: "numeric", month: "short" });
}

function diaperSummary(log) {
  const type = normalizeDiaperType(log.type);
  if (type === "pee") {
    const color = displayOther(log.peeColor, log.peeColorOther) || log.color;
    return [log.peeAmount || log.texture, color].filter(Boolean).join(" · ");
  }
  if (type === "poop") {
    const consistency = displayOther(log.poopConsistency, log.poopConsistencyOther) || log.texture;
    const color = displayOther(log.poopColor, log.poopColorOther) || log.color;
    return [consistency, color].filter(Boolean).join(" · ");
  }
  const pee = [log.peeAmount, displayOther(log.peeColor, log.peeColorOther)].filter(Boolean).join(", ");
  const poop = [displayOther(log.poopConsistency, log.poopConsistencyOther), displayOther(log.poopColor, log.poopColorOther)].filter(Boolean).join(", ");
  const fallback = [log.texture, log.color].filter(Boolean).join(" · ");
  return [pee ? `Pee: ${pee}` : "", poop ? `Poop: ${poop}` : "", !pee && !poop ? fallback : ""].filter(Boolean).join(" · ");
}

function displayOther(value, otherValue) {
  return value === "Other" ? otherValue || "Other" : value;
}

function localDateValue(date) {
  const copy = new Date(date);
  copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
  return copy.toISOString().slice(0, 10);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
