<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#ffbfa3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/src/utils/pwa-safe-area.css?v=soft-bg-20260615"/>
<link rel="stylesheet" href="/src/utils/theme.css?v=soft-bg-20260615"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Set Password - LittleNest MY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        surface: "#fff8f5",
        "surface-container": "#f4ebe6",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        error: "#ba1a1a",
        tertiary: "#486646"
      },
      fontFamily: { body: ["Nunito Sans", "sans-serif"] }
    }
  }
};
</script>
<style>.soft-shadow{box-shadow:0 18px 45px rgba(131,83,60,.12)} input{font-size:16px}</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<main class="min-h-screen px-6 py-8 max-w-md mx-auto flex flex-col justify-center">
<section class="rounded-[32px] bg-surface-container-lowest p-6 soft-shadow border border-white/70 space-y-5">
<div class="text-center space-y-3">
<div class="w-20 h-20 rounded-3xl bg-primary-container text-on-primary-container mx-auto flex items-center justify-center">
<span class="material-symbols-outlined text-[42px]">lock_reset</span>
</div>
<p class="text-sm font-extrabold uppercase tracking-wide text-primary">LittleNest MY</p>
<h1 class="text-3xl font-extrabold text-primary leading-tight">Set your password</h1>
<p class="text-base leading-6 text-on-surface-variant">You joined with an invite link. Set a password so you can log in next time.</p>
</div>
<form class="space-y-4" id="passwordForm">
<label class="block space-y-2">
<span class="font-bold text-sm text-on-surface">New password</span>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 text-on-surface focus:ring-2 focus:ring-primary" id="password" minlength="8" placeholder="At least 8 characters" type="password"/>
</label>
<label class="block space-y-2">
<span class="font-bold text-sm text-on-surface">Confirm password</span>
<input class="w-full h-14 rounded-2xl border-0 bg-surface-container px-4 text-on-surface focus:ring-2 focus:ring-primary" id="confirmPassword" minlength="8" placeholder="Repeat password" type="password"/>
</label>
<p class="hidden text-sm text-error" id="passwordError" aria-live="polite"></p>
<p class="hidden text-sm text-tertiary" id="passwordSuccess" aria-live="polite"></p>
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-extrabold active:scale-[0.98] transition-transform" type="submit">Save Password</button>
</form>
<button class="w-full h-12 rounded-full bg-surface-container text-primary font-bold active:scale-[0.98] transition-transform" id="skipButton" type="button">Not now</button>
</section>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { clearNeedsPasswordSetup, getAuthSession, isLoggedIn, updateCurrentUserPassword } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  const form = document.getElementById("passwordForm");
  const error = document.getElementById("passwordError");
  const success = document.getElementById("passwordSuccess");
  const submitButton = form.querySelector('button[type="submit"]');

  if (!(await isLoggedIn())) {
    window.location.replace(screenUrl("login"));
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    error.classList.add("hidden");
    success.classList.add("hidden");

    if (password.length < 8) return showError("Use at least 8 characters.");
    if (password !== confirmPassword) return showError("Passwords need to match.");

    submitButton.disabled = true;
    submitButton.textContent = "Saving...";
    try {
      await updateCurrentUserPassword(password);
      const session = await getAuthSession();
      clearNeedsPasswordSetup();
      success.textContent = `Password saved. You can now log in with ${session?.user?.email || "your email"} and password.`;
      success.classList.remove("hidden");
      setTimeout(() => window.location.href = screenUrl("home_dashboard"), 900);
    } catch (passwordError) {
      showError(passwordError.message || "Could not save password. Please try again.");
      submitButton.disabled = false;
      submitButton.textContent = "Save Password";
    }
  });

  document.getElementById("skipButton").addEventListener("click", () => {
    window.location.href = screenUrl("home_dashboard");
  });

  function showError(message) {
    error.textContent = message;
    error.classList.remove("hidden");
  }
</script>
</body></html>
