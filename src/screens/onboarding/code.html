<body class="flex flex-col min-h-screen text-on-surface">

<button class="relative z-10 flex-1 font-label-md text-label-md text-primary text-center" onclick="toggleLanguage('en')">English</button>
<button class="relative z-10 flex-1 font-label-md text-label-md text-on-surface-variant text-center" onclick="toggleLanguage('ms')">Melayu</button>

<script>
        function toggleLanguage(lang) {
            const pill = document.getElementById('language-pill');
            const buttons = document.querySelectorAll('header button');
            
            if (lang === 'en') {
                pill.style.transform = 'translateX(0)';
                buttons[0].classList.add('text-primary');
                buttons[0].classList.remove('text-on-surface-variant');
                buttons[1].classList.remove('text-primary');
                buttons[1].classList.add('text-on-surface-variant');
                
                // Update text content for English
                document.querySelector('h1').innerText = "Welcome to LittleNest MY";
                document.querySelector('p').innerText = "Track routines, milestones, and memories in one calm place.";
                document.querySelector('button.bg-primary').innerText = "Get Started";
                document.querySelector('p.text-outline').innerText = "By tapping Get Started, you agree to our Terms and Privacy Policy.";
            } else {
                pill.style.transform = 'translateX(100%)';
                buttons[1].classList.add('text-primary');
                buttons[1].classList.remove('text-on-surface-variant');
                buttons[0].classList.remove('text-primary');
                buttons[0].classList.add('text-on-surface-variant');
                
                // Update text content for Malay
                document.querySelector('h1').innerText = "Selamat Datang ke LittleNest MY";
                document.querySelector('p').innerText = "Jejaki rutin, pencapaian, dan kenangan dalam satu tempat yang tenang.";
                document.querySelector('button.bg-primary').innerText = "Mula Sekarang";
                document.querySelector('p.text-outline').innerText = "Dengan menekan Mula Sekarang, anda bersetuju dengan Terma dan Dasar Privasi kami.";
            }
        }

        // Simple entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            main.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
            
            setTimeout(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
<script type="module">
