<div class="grid grid-cols-3 gap-3">
<button class="glass-panel rounded-xl p-4 flex flex-col items-center gap-2 transition-all active:scale-95 option-card-active" data-type="pee" onclick="toggleType(this)">

<button class="glass-panel rounded-xl p-4 flex flex-col items-center gap-2 transition-all active:scale-95" data-type="mixed" onclick="toggleType(this)">
<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">layers</span>

</button>
</div>

<script>
        function toggleType(element) {
            const buttons = element.parentElement.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.remove('option-card-active');
                btn.classList.add('glass-panel');
            });
            element.classList.add('option-card-active');
            element.classList.remove('glass-panel');
        }

        // Texture toggle
        const textures = document.querySelectorAll('section:nth-of-type(2) button');
        textures.forEach(t => {
            t.addEventListener('click', () => {
                textures.forEach(btn => {
                    btn.classList.remove('border-primary', 'text-primary');
                    btn.classList.add('border-white/5', 'text-on-surface-variant');
                });
                t.classList.add('border-primary', 'text-primary');
                t.classList.remove('border-white/5', 'text-on-surface-variant');
            });
        });

        // Color toggle
        const colors = document.querySelectorAll('section:nth-of-type(3) button');
        colors.forEach(c => {
            c.addEventListener('click', () => {
                colors.forEach(btn => {
                    btn.classList.remove('border-primary');
                    btn.classList.add('border-white/10');
                    btn.style.borderWidth = '2px';
                });
                c.classList.add('border-primary');
                c.classList.remove('border-white/10');
                c.style.borderWidth = '4px';
            });
        });
    </script>
