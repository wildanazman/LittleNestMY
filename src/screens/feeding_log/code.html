<script type="module">
        const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
        const { babyProfile, feedingLogs: mockFeedingLogs } = await import(`${moduleBase}data/mockData.mjs`);
        const { formatDuration, formatTime } = await import(`${moduleBase}utils/dateFormat.mjs`);
        const { getLogsForBaby, getPersistedFeedingLogs } = await import(`${moduleBase}utils/localState.mjs`);
        const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
        const { deleteFeedingLogRemote, loadCoreLogsRemote, saveFeedingLogRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
        const { goToScreen, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);
        const { getBabyPermissions, redirectViewOnly } = await import(`${moduleBase}utils/permissions.mjs`);

        const state = { feedingType: "bottle" };
        const babyState = await loadBabyProfilesRemote(babyProfile);
        const selectedBabyId = babyState.selectedBabyId;
        const permissions = await getBabyPermissions(selectedBabyId);
        if (!permissions.canAddLogs) {
            redirectViewOnly((screenId) => window.location.protocol === "file:" ? `../${screenId}/code.html` : `/${screenId}/`);
            await new Promise(() => {});
        }
        const typeButtons = [...document.querySelectorAll("[data-feeding-type]")];
        const amountField = document.getElementById("amountField");
        const amountInput = document.getElementById("amountInput");
        const amountUnit = document.getElementById("amountUnit");
        const durationField = document.getElementById("durationField");
        const durationInput = document.getElementById("durationInput");
        const timeInput = document.getElementById("timeInput");
        const noteInput = document.getElementById("noteInput");
        const saveButton = document.getElementById("saveFeedingButton");
        const saveFeedback = document.getElementById("saveFeedback");
        const historyList = document.getElementById("feedingHistoryList");
        const backButton = document.getElementById("feedingBackButton");
        const seeAllButton = document.getElementById("feedingSeeAllButton");
        let feedingLogItems = getLogsForBaby(getPersistedFeedingLogs(mockFeedingLogs), selectedBabyId);

        typeButtons.forEach((button, index) => {
            button.addEventListener("click", () => {
                state.feedingType = button.dataset.feedingType;
                moveIndicator(index);
                updateRelevantFields();
            });
        });

        saveButton.addEventListener("click", saveEntry);
        backButton.addEventListener("click", () => goToScreen("quick_log"));
        seeAllButton.addEventListener("click", () => showComingSoon("Feeding history", "A full feeding history view is coming soon."));
        timeInput.value = getCurrentTimeValue();
        moveIndicator(1);
        updateRelevantFields();
        await refreshLogs();

        function moveIndicator(index) {
            const indicator = document.getElementById("active-indicator");
            const offset = index * 25;
            indicator.style.left = `calc(${offset}% + 4px)`;

            typeButtons.forEach((btn, i) => {
                btn.classList.toggle("text-primary", i === index);
                btn.classList.toggle("font-bold", i === index);
                btn.classList.toggle("text-on-surface", i !== index);
            });
        }

        function updateRelevantFields() {
            const usesAmount = ["bottle", "formula", "solid"].includes(state.feedingType);
            const usesDuration = ["breast", "bottle"].includes(state.feedingType);

            amountField.classList.toggle("hidden", !usesAmount);
            durationField.classList.toggle("hidden", !usesDuration);
            amountUnit.textContent = state.feedingType === "solid" ? "g" : "ml";
            amountInput.placeholder = state.feedingType === "solid" ? "45" : "120";
            durationInput.placeholder = state.feedingType === "breast" ? "15" : "10";
        }

        async function saveEntry() {
            const startedAt = buildDateTime(timeInput.value);
            const amountValue = Number(amountInput.value);
            const durationValue = Number(durationInput.value);
            const usesAmount = ["bottle", "formula", "solid"].includes(state.feedingType);
            const usesDuration = ["breast", "bottle"].includes(state.feedingType);
            const endedAt = usesDuration && durationValue > 0
                ? new Date(new Date(startedAt).getTime() + durationValue * 60000).toISOString()
                : undefined;
            if ((amountInput.value && (!Number.isFinite(amountValue) || amountValue <= 0)) || (durationInput.value && (!Number.isFinite(durationValue) || durationValue <= 0))) {
                saveFeedback.textContent = "Use a positive number for amount or duration.";
                saveFeedback.classList.remove("hidden");
                return;
            }

            const log = {
                id: `feed-local-${Date.now()}`,
                babyId: selectedBabyId,
                type: state.feedingType,
                startedAt,
                endedAt,
                amountMl: usesAmount && state.feedingType !== "solid" && amountValue > 0 ? amountValue : undefined,
                amountGrams: usesAmount && state.feedingType === "solid" && amountValue > 0 ? amountValue : undefined,
                durationMinutes: usesDuration && durationValue > 0 ? durationValue : undefined,
                foodName: state.feedingType === "solid" ? "Solid food" : undefined,
                notes: noteInput.value.trim() || undefined
            };

            try {
                await saveFeedingLogRemote(log);
            } catch (error) {
                saveFeedback.textContent = `${error.message || "Could not sync feeding log."} Saved locally for now.`;
                saveFeedback.classList.remove("hidden");
            }
            amountInput.value = "";
            durationInput.value = "";
            noteInput.value = "";
            timeInput.value = getCurrentTimeValue();
            await refreshLogs();
            showSavedFeedback();
        }

        async function refreshLogs() {
            const result = await loadCoreLogsRemote(selectedBabyId, { feedingLogs: mockFeedingLogs });
            feedingLogItems = result.feedingLogs;
            if (result.error) {
                saveFeedback.textContent = result.error;
                saveFeedback.classList.remove("hidden");
            }
            renderHistory();
        }

        function renderHistory() {
            const logs = feedingLogItems
                .sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt))
                .slice(0, 5);

            historyList.innerHTML = logs.length
        ? logs.map(renderHistoryCard).join("")
                : renderEmptyHistory();
            bindHistoryActions();
        }

        function renderEmptyHistory() {
            return `
                <div class="bg-surface-container-lowest p-6 rounded-3xl custom-shadow border border-primary-container/30 text-center space-y-3">
                    <div class="w-16 h-16 rounded-full bg-primary-container/40 text-primary mx-auto flex items-center justify-center">
                        <span class="material-symbols-outlined text-[34px]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
                    </div>
                    <div>
                        <p class="font-headline-md text-headline-md text-on-surface">No feeding logs yet</p>
                        <p class="font-body-md text-body-md text-on-surface-variant">Add what you remember. Rough tracking is okay.</p>
                    </div>
                </div>
            `;
        }

        function renderHistoryCard(log) {
            const amount = log.amountGrams
                ? `${log.amountGrams} g`
                : log.amountMl
                    ? `${log.amountMl} ml`
                    : log.durationMinutes
                        ? formatDuration(log.durationMinutes)
                        : log.endedAt
                            ? formatDuration(Math.round((new Date(log.endedAt) - new Date(log.startedAt)) / 60000))
                            : "Logged";

            return `
                <div class="bg-surface-container-lowest p-4 rounded-3xl custom-shadow flex items-center justify-between group transition-all">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="w-12 h-12 rounded-2xl ${iconTone(log.type)} flex items-center justify-center shrink-0">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">${iconForType(log.type)}</span>
                        </div>
                        <div class="min-w-0">
                            <p class="font-label-md text-label-md text-on-surface truncate">${labelForType(log.type)}</p>
                            <p class="font-body-md text-label-sm text-on-surface-variant">${relativeDay(log.startedAt)} &middot; ${formatTime(log.startedAt)}</p>
                            ${log.notes ? `<p class="font-body-md text-label-sm text-on-surface-variant truncate">${escapeHtml(log.notes)}</p>` : ""}
                        </div>
                    </div>
                    <div class="text-right shrink-0 pl-3">
                        <p class="font-headline-md text-headline-md text-primary">${amount}</p>
                        <button class="mt-1 text-label-sm text-error" data-delete-feed="${log.id}" type="button">Delete</button>
                    </div>
                </div>
            `;
        }

        function bindHistoryActions() {
            historyList.querySelectorAll("[data-delete-feed]").forEach((button) => {
                button.addEventListener("click", async () => {
                    if (!confirm("Delete this feeding log?")) return;
                    try {
                        await deleteFeedingLogRemote(button.dataset.deleteFeed);
                    } catch (error) {
                        saveFeedback.textContent = `${error.message || "Could not sync delete."} Removed locally for now.`;
                        saveFeedback.classList.remove("hidden");
                    }
                    await refreshLogs();
                    saveFeedback.textContent = "Feeding log deleted.";
                    saveFeedback.classList.remove("hidden");
                });
            });
        }

        function buildDateTime(timeValue) {
            const [hours, minutes] = timeValue.split(":").map(Number);
            const date = new Date();
            date.setHours(hours || 0, minutes || 0, 0, 0);
            return date.toISOString();
        }

        function getCurrentTimeValue() {
            const date = new Date();
            return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
        }

        function showSavedFeedback() {
            saveFeedback.textContent = "Saved. Home dashboard will use this latest feed.";
            saveFeedback.classList.remove("hidden");
            setTimeout(() => saveFeedback.classList.add("hidden"), 2400);
        }

        function labelForType(type) {
            return {
                breast: "Breastfeeding",
                bottle: "Bottle feeding",
                formula: "Formula feeding",
                solid: "Solid food"
            }[type] || "Feeding";
        }

        function iconForType(type) {
            return type === "solid" ? "restaurant" : "local_drink";
        }

        function iconTone(type) {
            return type === "formula"
                ? "bg-tertiary-container/30 text-tertiary"
                : type === "solid"
                    ? "bg-secondary-container/50 text-secondary"
                    : "bg-primary-container/30 text-primary";
        }

        function relativeDay(dateTime) {
            const date = new Date(dateTime);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return "Today";
            if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
            return date.toLocaleDateString("en-MY", { day: "numeric", month: "short" });
        }

        function escapeHtml(value) {
            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>
