<script type="module">
const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
const { deleteHealthNoteRemote, loadCoreLogsRemote, saveHealthNoteRemote } = await import(`${moduleBase}utils/coreLogsRemote.mjs`);
const { goToScreen, bindPrototypeActions, screenUrl } = await import(`${moduleBase}utils/prototypeUi.mjs`);
const { getBabyPermissions, viewOnlyMessage } = await import(`${moduleBase}utils/permissions.mjs`);

const babyState = await loadBabyProfilesRemote(babyProfile);
const selectedBabyId = babyState.selectedBabyId;
const selectedBaby = babyState.selectedBaby;
if (!selectedBabyId || !selectedBaby) {
  window.location.replace(`${screenUrl("add_baby_profile")}?mode=create`);
  await new Promise(() => {});
}
const permissions = await getBabyPermissions(selectedBabyId);
let healthRecords = [];

const feedback = document.getElementById("feedback");
const form = document.getElementById("healthForm");
const formError = document.getElementById("formError");

document.getElementById("babyTitle").textContent = `${selectedBaby.name}'s health records`;
renderQuickSymptoms();

function renderQuickSymptoms() {
  if (!permissions.canAddLogs) return;
  const section = document.getElementById("quickSymptomSection");
  const wrap = document.getElementById("quickSymptomChips");
  if (!section || !wrap) return;
  const SYMPTOMS = [
    { label: "Teething", icon: "dentistry", type: "note" },
    { label: "Fever", icon: "thermostat", type: "temperature" },
    { label: "Cough", icon: "coronavirus", type: "illness" },
    { label: "Runny nose", icon: "sick", type: "illness" },
    { label: "Rash", icon: "healing", type: "illness" },
    { label: "Vomiting", icon: "sick", type: "illness" },
    { label: "Diarrhea", icon: "sick", type: "illness" },
    { label: "Fussy / colic", icon: "mood_bad", type: "note" }
  ];
  section.classList.remove("hidden");
  wrap.innerHTML = SYMPTOMS.map((s) => `
    <button type="button" data-symptom="${s.label}" data-symptom-type="${s.type}" class="inline-flex items-center gap-1.5 rounded-full border border-outline-variant bg-surface-container px-3.5 py-2 text-[14px] font-bold text-on-surface active:scale-95 transition-transform">
      <span class="material-symbols-outlined text-[18px] text-primary">${s.icon}</span>${s.label}
    </button>`).join("");
  wrap.querySelectorAll("[data-symptom]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (btn.dataset.busy === "1") return;
      btn.dataset.busy = "1";
      btn.classList.add("opacity-60");
      try {
        await saveHealthNoteRemote({
          id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `health-local-${Date.now()}`,
          babyId: selectedBabyId,
          type: btn.dataset.symptomType,
          title: btn.dataset.symptom,
          recordedAt: new Date().toISOString()
        });
        showFeedback(`${btn.dataset.symptom} logged.`);
        await refreshRecords();
      } catch (error) {
        showFeedback(`${error.message || "Could not sync."} Saved locally for now.`);
        await refreshRecords();
      } finally {
        btn.dataset.busy = "0";
        btn.classList.remove("opacity-60");
      }
    });
  });
}
document.getElementById("backButton").addEventListener("click", () => goToScreen("quick_log"));
setDefaultDateTime();
bindPrototypeActions();
if (!permissions.canAddLogs) {
  document.getElementById("entrySection").classList.add("hidden");
  showFeedback(viewOnlyMessage);
}

document.getElementById("recordType").addEventListener("change", updateLabels);
form.addEventListener("submit", async (event) => {
  event.preventDefault();
  if (!permissions.canAddLogs) return showFeedback(viewOnlyMessage);
  const type = document.getElementById("recordType").value;
  const title = document.getElementById("titleInput").value.trim();
  const dose = document.getElementById("doseInput").value.trim();
  const details = document.getElementById("notesInput").value.trim();
  const temperatureC = parseNumber("tempInput");
  const recordedAt = buildRecordedAt();
  if (!title && !details && !temperatureC) return showError("Add a title, temperature, or note to save.");

  // Auto-classify common medicines so "Paracetamol" logged as a generic
  // Health record still counts as Medicine.
  const MEDICINE_KEYWORDS = ["paracetamol", "panadol", "calpol", "ibuprofen", "nurofen", "ponstan", "zyrtec", "fenistil", "amoxicillin", "augmentin", "klacid", "antibiotic", "syrup", "ubat", "vitamin", "probiotic", "zinc", "ors", "oralite"];
  let finalType = type;
  if ((type === "health" || type === "note") && MEDICINE_KEYWORDS.some((k) => title.toLowerCase().includes(k))) {
    finalType = "medicine";
  }
  const medicineName = finalType === "medicine" ? title : "";
  const body = [
    dose ? `Dose: ${dose}` : "",
    details
  ].filter(Boolean).join("\n");

  try {
    await saveHealthNoteRemote({
      id: crypto.randomUUID ? crypto.randomUUID() : `health-local-${Date.now()}`,
      babyId: selectedBabyId,
      type: finalType,
      title: title || defaultTitle(finalType),
      temperatureC: temperatureC || undefined,
      medicineName: medicineName || undefined,
      details: body || undefined,
      recordedAt
    });
    form.reset();
    setDefaultDateTime();
    updateLabels();
    showFeedback("Medicine record saved.");
    await refreshRecords();
  } catch (error) {
    showFeedback(`${error.message || "Could not sync record."} Saved locally for now.`);
    await refreshRecords();
  }
});

await refreshRecords();

async function refreshRecords() {
  const result = await loadCoreLogsRemote(selectedBabyId, { feedingLogs: [], sleepLogs: [], diaperLogs: [], healthNotes: [] });
  healthRecords = result.healthNotes.sort((a, b) => new Date(b.recordedAt) - new Date(a.recordedAt));
  document.getElementById("recordCount").textContent = `${healthRecords.length} record${healthRecords.length === 1 ? "" : "s"}`;
  renderSymptomTracker();
  renderHistory();
}

// Aggregate symptom records (last 30 days) into per-symptom summaries so the
// parent can see how long something has been going and whether it's resolved.
function renderSymptomTracker() {
  const section = document.getElementById("symptomTrackerSection");
  const list = document.getElementById("symptomTrackerList");
  if (!section || !list) return;
  const DAY = 86400000;
  const now = Date.now();
  const since = now - 30 * DAY;
  // Allowlist what counts as a symptom: the quick-add symptoms (and the
  // diaper-rash auto-log) by title, plus the symptom record types. This keeps
  // medicine, clinic and generic "Health record" notes out of the tracker.
  const SYMPTOM_TYPES = new Set(["illness", "temperature"]);
  const SYMPTOM_TITLES = new Set([
    "teething", "fever", "cough", "runny nose", "rash", "vomiting", "diarrhoea", "fussy / colic", "diaper rash"
  ]);
  const groups = new Map();
  for (const r of healthRecords) {
    const type = String(r.type || "note").toLowerCase();
    const title = String(r.title || "Symptom").trim() || "Symptom";
    const isSymptom = SYMPTOM_TYPES.has(type) || SYMPTOM_TITLES.has(title.toLowerCase());
    if (!isSymptom) continue;
    const at = new Date(r.recordedAt).getTime();
    if (Number.isNaN(at) || at < since) continue;
    const key = title;
    const g = groups.get(key) || { title: key, count: 0, first: at, last: at };
    g.count += 1;
    g.first = Math.min(g.first, at);
    g.last = Math.max(g.last, at);
    groups.set(key, g);
  }
  const rows = [...groups.values()].sort((a, b) => b.last - a.last);
  if (!rows.length) { section.classList.add("hidden"); list.innerHTML = ""; return; }
  section.classList.remove("hidden");

  const dayDiff = (ms) => Math.floor((now - ms) / DAY);
  list.innerHTML = rows.map((g) => {
    const sinceLast = dayDiff(g.last);
    const status = sinceLast <= 2 ? "Active" : sinceLast <= 7 ? "Watching" : "Resolved";
    const badge = status === "Active"
      ? "background:#ffdad6;color:#93000a"
      : status === "Watching"
        ? "background:#ffe2b8;color:#7a4b06"
        : "background:#b5d6af;color:#1f3a1e";
    const spanDays = Math.max(1, Math.round((g.last - g.first) / DAY) + 1);
    const spanLabel = g.count === 1 ? "once" : `${g.count}× over ${spanDays} day${spanDays === 1 ? "" : "s"}`;
    const lastLabel = sinceLast <= 0 ? "today" : sinceLast === 1 ? "yesterday" : `${sinceLast} days ago`;
    return `
      <div class="rounded-2xl bg-surface-container-lowest p-4 soft-shadow flex items-center justify-between gap-3">
        <div class="min-w-0">
          <p class="font-bold text-[16px] text-on-surface truncate">${escapeHtml(g.title)}</p>
          <p class="text-[13px] text-on-surface-variant">${spanLabel} · last ${lastLabel}</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="rounded-full px-3 py-1 text-[12px] font-extrabold" style="${badge}">${status}</span>
          ${permissions.canAddLogs ? `<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface-variant/70 hover:text-error hover:bg-error-container/30 active:scale-90 transition-all" data-clear-symptom="${escapeHtml(g.title)}" aria-label="Clear ${escapeHtml(g.title)} records" type="button"><span class="material-symbols-outlined text-[19px]">delete</span></button>` : ""}
        </div>
      </div>`;
  }).join("");

  list.querySelectorAll("[data-clear-symptom]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const title = btn.dataset.clearSymptom;
      const ids = healthRecords.filter((r) => String(r.title || "").trim() === title).map((r) => r.id);
      if (!ids.length) return;
      if (!confirm(`Clear all "${title}" records (${ids.length})?`)) return;
      btn.disabled = true;
      for (const id of ids) {
        try { await deleteHealthNoteRemote(id); } catch (e) { console.warn(e); }
      }
      await refreshRecords();
      showFeedback(`Cleared "${title}".`);
    });
  });
}

function renderHistory() {
  document.getElementById("historyList").innerHTML = healthRecords.length
    ? healthRecords.map(renderRecord).join("")
    : `<div class="rounded-2xl bg-surface-container-low p-5 text-center"><p class="font-bold text-on-surface">No health records yet</p><p class="text-[15px] text-on-surface-variant">Health, fever, sakit notes, and clinic records will appear here.</p></div>`;
  document.querySelectorAll("[data-delete-health]").forEach((button) => {
    button.addEventListener("click", async () => {
      if (!confirm("Delete this health record?")) return;
      button.disabled = true;
      await deleteHealthNoteRemote(button.dataset.deleteHealth);
      await refreshRecords();
    });
  });
}

function renderRecord(record) {
  const date = new Date(record.recordedAt).toLocaleString("en-MY", { day: "numeric", month: "short", year: "numeric", hour: "numeric", minute: "2-digit" });
  const type = labelType(record.type);
  const details = [record.temperatureC ? `${record.temperatureC} C` : "", record.medicineName || "", record.details || ""].filter(Boolean);
  return `
    <article class="rounded-[22px] bg-surface-container-lowest p-4 soft-shadow border border-white/60 space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="text-[12px] font-bold uppercase tracking-wide text-primary">${type}</p>
          <h3 class="text-[18px] leading-6 font-bold text-on-surface truncate">${escapeHtml(record.title || "Medicine record")}</h3>
          <p class="text-[13px] font-bold text-on-surface-variant">${date}</p>
        </div>
        <span class="material-symbols-outlined text-primary">${iconForType(record.type)}</span>
      </div>
      ${details.length ? `<p class="text-[15px] leading-6 text-on-surface-variant whitespace-pre-wrap">${escapeHtml(details.join("\n"))}</p>` : ""}
      ${permissions.canManageBaby ? `<button class="text-error text-[13px] font-bold" data-delete-health="${escapeHtml(record.id)}" type="button">Delete</button>` : ""}
    </article>
  `;
}

function updateLabels() {
  const type = document.getElementById("recordType").value;
  document.getElementById("titleLabel").textContent = type === "health" ? "Record title" : type === "illness" ? "Sickness / illness" : "Record title";
  document.getElementById("titleInput").placeholder = type === "health" ? "Example: Paracetamol" : type === "illness" ? "Example: Fever, cough, flu" : "Example: Clinic note";
}

function setDefaultDateTime() {
  const now = new Date();
  document.getElementById("dateInput").value = now.toISOString().slice(0, 10);
  document.getElementById("timeInput").value = now.toTimeString().slice(0, 5);
}

function buildRecordedAt() {
  const date = document.getElementById("dateInput").value || new Date().toISOString().slice(0, 10);
  const time = document.getElementById("timeInput").value || "09:00";
  return new Date(`${date}T${time}:00`).toISOString();
}

function defaultTitle(type) {
  return {
    health: "Medicine record",
    illness: "Sickness note",
    temperature: "Temperature note",
    clinic: "Clinic note",
    note: "Health note"
  }[type] || "Medicine record";
}

function labelType(type) {
  return {
    health: "Medicine",
    illness: "Sickness",
    temperature: "Temperature",
    clinic: "Clinic",
    note: "Health note"
  }[type] || "Medicine";
}

function iconForType(type) {
  return {
    health: "heart_plus",
    illness: "sick",
    temperature: "thermometer",
    clinic: "local_hospital",
    note: "edit_note"
  }[type] || "medical_information";
}

function parseNumber(id) {
  const value = Number(document.getElementById(id).value);
  return Number.isFinite(value) ? value : 0;
}

function showError(message) {
  formError.textContent = message;
  formError.classList.remove("hidden");
}

function showFeedback(message) {
  feedback.textContent = message;
  feedback.classList.remove("hidden");
  setTimeout(() => feedback.classList.add("hidden"), 2800);
}

function escapeHtml(value) {
  return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}
</script>
