<script type="module">
        const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
        const { babyProfile, diaperLogs: mockDiaperLogs } = await import(`${moduleBase}data/mockData.mjs`);
        const { formatTime } = await import(`${moduleBase}utils/dateFormat.mjs`);
        const { deleteLocalDiaperLog, getLogsForBaby, getPersistedDiaperLogs, getSelectedBabyId, saveLocalDiaperLog } = await import(`${moduleBase}utils/localState.mjs`);
        const { goToScreen, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);

        const state = {
            diaperType: "wet",
            color: "",
            texture: "Normal"
        };
        const selectedBabyId = getSelectedBabyId(babyProfile);
        const segmentButtons = [...document.querySelectorAll("[data-diaper-type]")];
        const detailButtons = [...document.querySelectorAll("[data-color], [data-texture]")];
        const notesInput = document.getElementById("diaperNotesInput");
        const saveButton = document.getElementById("saveDiaperButton");
        const saveFeedback = document.getElementById("diaperSaveFeedback");
        const historyList = document.getElementById("diaperHistoryList");
        const timeLabel = document.getElementById("diaperTimeLabel");
        const backButton = document.getElementById("diaperBackButton");

        segmentButtons.forEach((button, index) => {
            button.addEventListener("click", () => {
                state.diaperType = button.dataset.diaperType;
                updateSegment(index);
            });
        });

        detailButtons.forEach((button) => {
            button.addEventListener("click", () => {
                state.color = button.dataset.color || state.color;
                state.texture = button.dataset.texture || state.texture;
                updateDetailSelection(button);
            });
        });

        saveButton.addEventListener("click", saveDiaperLog);
        backButton.addEventListener("click", () => goToScreen("quick_log"));
        updateSegment(0);
        updateNowLabel();
        setInterval(updateNowLabel, 30000);
        renderHistory();

        function updateSegment(index) {
            const indicator = document.getElementById('segment-indicator');
            const buttons = indicator.parentElement.querySelectorAll('button');
            
            // Move indicator
            const offset = (index * 33.33) + 1; // Slight adjustment for padding
            indicator.style.left = `${offset}%`;
            
            // Update text colors
            buttons.forEach((btn, idx) => {
                if (idx === index) {
                    btn.classList.add('text-on-surface');
                    btn.classList.remove('text-on-surface-variant');
                } else {
                    btn.classList.remove('text-on-surface');
                    btn.classList.add('text-on-surface-variant');
                }
            });
        }

        function updateDetailSelection(activeButton) {
            detailButtons.forEach((button) => {
                button.querySelector("div")?.classList.remove("border-2", "border-primary");
                button.querySelector("span")?.classList.remove("text-primary");
                button.querySelector("span")?.classList.add("text-on-surface-variant");
            });
            activeButton.querySelector("div")?.classList.add("border-2", "border-primary");
            activeButton.querySelector("span")?.classList.add("text-primary");
            activeButton.querySelector("span")?.classList.remove("text-on-surface-variant");
        }

        function saveDiaperLog() {
            const log = {
                id: `diaper-local-${Date.now()}`,
                babyId: selectedBabyId,
                type: state.diaperType,
                changedAt: new Date().toISOString(),
                color: state.color || undefined,
                texture: state.texture || undefined,
                notes: notesInput.value.trim() || undefined
            };

            saveLocalDiaperLog(log);
      notesInput.value = "";
            renderHistory();
            showSavedFeedback();
        }

        function renderHistory() {
            const logs = getLogsForBaby(getPersistedDiaperLogs(mockDiaperLogs), selectedBabyId)
                .sort((a, b) => new Date(b.changedAt) - new Date(a.changedAt))
                .slice(0, 5);

            historyList.innerHTML = logs.length
        ? logs.map(renderHistoryCard).join("")
                : renderEmptyHistory();
            bindHistoryCards();
        }

        function renderEmptyHistory() {
            return `
                <div class="bg-surface-container-lowest rounded-2xl p-6 soft-shadow border border-tertiary-container/30 text-center space-y-3">
                    <div class="w-16 h-16 rounded-full bg-tertiary-container/40 text-tertiary mx-auto flex items-center justify-center">
                        <span class="material-symbols-outlined text-[34px]">baby_changing_station</span>
                    </div>
                    <div>
                        <p class="font-headline-md text-headline-md text-on-surface">No diaper logs yet</p>
                        <p class="font-body-md text-body-md text-on-surface-variant">Add the next change when you can. Rough tracking is okay.</p>
                    </div>
                </div>
            `;
        }

        function renderHistoryCard(log) {
            const detail = [labelForType(log.type), log.texture, log.color].filter(Boolean).join(" · ");
            return `
                <div class="bg-surface-container-lowest rounded-2xl p-4 soft-shadow flex items-center justify-between cursor-pointer" data-diaper-detail="${detail}" role="button" tabindex="0">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-11 h-11 rounded-2xl ${toneForType(log.type)} flex items-center justify-center shrink-0">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">baby_changing_station</span>
                        </div>
                        <div class="min-w-0">
                            <p class="font-label-md text-label-md text-on-surface truncate">${detail}</p>
                            <p class="font-label-sm text-label-sm text-on-surface-variant">${relativeDay(log.changedAt)} · ${formatTime(log.changedAt)}</p>
                            ${log.notes ? `<p class="font-label-sm text-label-sm text-on-surface-variant truncate">${escapeHtml(log.notes)}</p>` : ""}
                        </div>
                    </div>
                    <button class="text-label-sm text-error shrink-0" data-delete-diaper="${log.id}" type="button">Delete</button>
                </div>
            `;
        }

        function bindHistoryCards() {
            historyList.querySelectorAll("[data-delete-diaper]").forEach((button) => {
                button.addEventListener("click", (event) => {
                    event.stopPropagation();
                    if (!confirm("Delete this diaper log?")) return;
                    deleteLocalDiaperLog(button.dataset.deleteDiaper);
                    renderHistory();
                    saveFeedback.textContent = "Diaper log deleted.";
                    saveFeedback.classList.remove("hidden");
                });
            });
            historyList.querySelectorAll("[data-diaper-detail]").forEach((card) => {
                card.addEventListener("click", () => showComingSoon(
                    "Diaper detail",
                    `${card.dataset.diaperDetail} detail view is coming soon.`
                ));
            });
        }

        function updateNowLabel() {
            timeLabel.textContent = formatTime(new Date().toISOString());
        }

        function showSavedFeedback() {
            saveFeedback.textContent = "Saved. Dashboard will use this latest change.";
            saveFeedback.classList.remove("hidden");
            setTimeout(() => saveFeedback.classList.add("hidden"), 2200);
        }

        function labelForType(type) {
            return {
                wet: "Pee",
                dirty: "Poop",
                mixed: "Mixed"
            }[type] || "Diaper";
        }

        function toneForType(type) {
            return type === "wet"
                ? "bg-[#E0F2FE] text-[#0369A1]"
                : type === "dirty"
                    ? "bg-primary-container/30 text-primary"
                    : "bg-tertiary-container/40 text-tertiary";
        }

        function relativeDay(dateTime) {
            const date = new Date(dateTime);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return "Today";
            if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
            return date.toLocaleDateString("en-MY", { day: "numeric", month: "short" });
        }

        function escapeHtml(value) {
            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>
