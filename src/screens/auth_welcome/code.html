  darkMode: "class",
  theme: {
    extend: {
      colors: {

        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        secondary: "#745b4e",
        "secondary-container": "#ffdcc8",
        tertiary: "#5f6335",
        "tertiary-container": "#e5e9ad",
        surface: "#fff8f5",

<style>
html, body { height: 100%; overflow: hidden; }
.soft-shadow { box-shadow: 0 18px 45px rgba(131, 83, 60, 0.12); }
.font-jakarta { font-family: "Nunito Sans", sans-serif; letter-spacing: -0.015em; }
/* Soft staged entrance tuned for iOS PWA without elastic bounce. */
@keyframes wlc-reveal { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
@keyframes wlc-pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
@keyframes wlc-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
@media (prefers-reduced-motion: no-preference) {
  .wlc-reveal { opacity: 0; animation: wlc-reveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; animation-delay: var(--d, 0ms); }
  .wlc-pop { opacity: 0; animation: wlc-pop 0.62s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: var(--d, 0ms); }
  .wlc-float { animation: wlc-float 5.5s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
  .wlc-float-2 { animation: wlc-float 6.5s cubic-bezier(0.45, 0, 0.55, 1) infinite; animation-delay: .8s; }
  .cta-sheen { position: relative; overflow: hidden; }
  .cta-sheen::after { content: ""; position: absolute; inset: 0; background: linear-gradient(115deg, transparent 32%, rgba(255,255,255,.4) 50%, transparent 68%); transform: translateX(-130%); }
  .cta-sheen:active::after { transform: translateX(130%); transition: transform .55s cubic-bezier(0.16, 1, 0.3, 1); }
}
</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="auth-polish bg-surface text-on-surface font-body">
<main class="auth-welcome-shell relative h-[100dvh] overflow-hidden max-w-md mx-auto flex flex-col px-6 pt-[max(1rem,env(safe-area-inset-top))] pb-[max(1rem,env(safe-area-inset-bottom))]">
<!-- soft ambient blobs -->
<div aria-hidden="true" class="pointer-events-none absolute inset-0 overflow-hidden">
<div class="absolute -top-20 -right-12 w-60 h-60 rounded-full blur-3xl" style="background:rgba(155,124,255,0.28)"></div>
<div class="absolute top-1/3 -left-16 w-52 h-52 rounded-full blur-3xl" style="background:rgba(255,159,200,0.22)"></div>
<div class="absolute bottom-6 right-0 w-48 h-48 rounded-full blur-3xl" style="background:rgba(132,204,255,0.20)"></div>
</div>

<div class="relative flex items-center gap-2.5 shrink-0 mb-3 wlc-reveal" style="--d:0ms">
<div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white" style="background:linear-gradient(145deg,#9b7cff,#7056f4);box-shadow:0 8px 20px rgba(112,86,244,.34)">
<span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1;">crib</span>
</div>
<span class="auth-welcome-brand font-jakarta text-xl font-extrabold" style="color:#7056f4">LittleNest MY</span>
</div>

<!-- hero -->
<div class="auth-welcome-hero relative flex-1 min-h-0 rounded-[34px] overflow-hidden mb-5 wlc-pop" style="--d:80ms;background:linear-gradient(160deg,#efe7ff 0%,#ffe7f1 54%,#e6f4ff 100%)">
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<div class="auth-welcome-orb absolute inset-0 rounded-full blur-2xl" style="background:rgba(155,124,255,.42);transform:scale(1.45)"></div>
<div class="auth-welcome-avatar relative w-[clamp(96px,27vw,138px)] aspect-square rounded-full bg-white/85 flex items-center justify-center" style="box-shadow:0 18px 50px rgba(112,86,244,.28), inset 0 2px 0 rgba(255,255,255,.9)">
<span class="material-symbols-outlined text-[clamp(48px,14vw,70px)]" style="font-variation-settings:'FILL' 1;color:#7056f4">family_restroom</span>
</div>
</div>
</div>
<div class="auth-floating-chip wlc-float absolute top-6 left-6 w-11 h-11 rounded-2xl bg-white/80 flex items-center justify-center" style="box-shadow:0 8px 20px rgba(112,86,244,.16)"><span class="material-symbols-outlined text-[20px]" style="color:#ff8fb0;font-variation-settings:'FILL' 1;">nutrition</span></div>
<div class="auth-floating-chip wlc-float-2 absolute bottom-8 right-6 w-11 h-11 rounded-2xl bg-white/80 flex items-center justify-center" style="box-shadow:0 8px 20px rgba(112,86,244,.16)"><span class="material-symbols-outlined text-[20px]" style="color:#7c5cff;font-variation-settings:'FILL' 1;">bedtime</span></div>
<div class="auth-floating-chip wlc-float absolute top-1/2 right-9 w-9 h-9 rounded-xl bg-white/75 flex items-center justify-center" style="box-shadow:0 6px 16px rgba(112,86,244,.14)"><span class="material-symbols-outlined text-[18px]" style="color:#5bb36a;font-variation-settings:'FILL' 1;">eco</span></div>
</div>

<!-- copy -->
<div class="relative space-y-2 shrink-0 wlc-reveal" style="--d:200ms">
<h1 class="font-jakarta text-[clamp(27px,7.4vw,36px)] leading-[1.05] font-extrabold text-on-surface">Track the little things.<br><span style="color:#7056f4">Keep the big moments.</span></h1>
<p class="text-base leading-6 text-on-surface-variant">A calm companion for your baby's feeds, sleep, milestones &amp; memories.</p>
</div>

<!-- actions -->
<div class="relative space-y-2.5 pt-4 shrink-0 wlc-reveal" style="--d:320ms">
<button class="auth-primary-action cta-sheen w-full h-13 min-h-[52px] rounded-full text-white font-bold text-base active:scale-[0.98] transition-transform" data-screen-target="login" type="button" style="background:linear-gradient(145deg,#9b7cff,#7056f4);box-shadow:0 14px 30px rgba(112,86,244,.34)">Log In</button>
<button class="auth-secondary-action w-full h-13 min-h-[52px] rounded-full font-bold text-base active:scale-[0.98] transition-transform" data-screen-target="signup" type="button" style="background:rgba(112,86,244,.12);color:#5b46c9">Create Account</button>
<button class="auth-guest-action w-full h-13 min-h-[52px] rounded-full bg-surface-container text-on-surface-variant font-bold text-base active:scale-[0.98] transition-transform" id="guestButton" type="button">Continue as Guest</button>
<p class="text-center text-xs leading-4 text-on-surface-variant">Guest data is saved only on this device.</p>
</div>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { hasAnyBabyProfileRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { getPendingInviteToken, clearPendingInviteToken, isGuestMode, isLoggedIn, loginAsGuest, routeAfterAuth } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { loadInvitePreviewRemote } = await import(`${moduleBase}utils/familyInvitesRemote.mjs`);
  const { bindPrototypeActions, screenUrl, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  if (!isGuestMode() && await isLoggedIn()) {
    const pendingInviteToken = getPendingInviteToken();
    if (await hasUsablePendingInvite(pendingInviteToken)) {
      window.location.replace(`${screenUrl("accept_invite")}?token=${encodeURIComponent(pendingInviteToken)}`);
    } else {
      window.location.replace(routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl));
    }
    await new Promise(() => {});
  }

  bindPrototypeActions();
  document.getElementById("guestButton").addEventListener("click", async () => {
    await loginAsGuest();
    window.location.href = routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl);
  });

  async function hasUsablePendingInvite(token) {
    if (!token) return false;
    try {
      const invite = await loadInvitePreviewRemote(token);
      const status = String(invite?.status || "pending");
      if (!["expired", "revoked", "declined", "accepted"].includes(status)) return true;
    } catch {
      // Stale/broken invite token should not trap normal app entry.
    }
    clearPendingInviteToken();
    return false;
  }
</script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
