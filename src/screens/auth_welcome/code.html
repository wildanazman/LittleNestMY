<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        secondary: "#745b4e",
        "secondary-container": "#ffdcc8",
        tertiary: "#5f6335",
        "tertiary-container": "#e5e9ad",
        surface: "#fff8f5",
        "surface-container": "#f4ebe6",
        "surface-container-low": "#fff1ea",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        outline: "#85736b"
      },
      fontFamily: {
        display: ["Nunito Sans", "sans-serif"],
        headline: ["Nunito Sans", "sans-serif"],
        body: ["Nunito Sans", "sans-serif"],
        label: ["Nunito Sans", "sans-serif"]
      }
    }
  }
};
</script>
<style>
html, body { height: 100%; overflow: hidden; }
.soft-shadow { box-shadow: 0 18px 45px rgba(131, 83, 60, 0.12); }
</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface font-body">
<main class="h-[100dvh] overflow-hidden max-w-md mx-auto flex flex-col px-6 pt-[max(1rem,env(safe-area-inset-top))] pb-[max(1rem,env(safe-area-inset-bottom))]">
<div class="flex items-center justify-between shrink-0 mb-3">
<div class="w-11 h-11 rounded-2xl bg-primary-container text-on-primary-container flex items-center justify-center soft-shadow">
<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">crib</span>
</div>
<span class="text-sm font-bold text-primary">LittleNest MY</span>
</div>
<div class="rounded-[32px] bg-surface-container-lowest soft-shadow p-5 border border-white/70 flex-1 min-h-0 flex flex-col">
<div class="flex-1 min-h-0 rounded-[28px] bg-gradient-to-br from-primary-container via-surface-container-low to-tertiary-container flex items-center justify-center mb-4">
<div class="w-[clamp(72px,22vw,112px)] aspect-square rounded-full bg-white/70 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[clamp(40px,12vw,64px)]" style="font-variation-settings:'FILL' 1;">family_restroom</span>
</div>
</div>
<div class="space-y-2 shrink-0">
<h1 class="text-[clamp(26px,7vw,34px)] leading-tight font-extrabold text-primary">LittleNest MY</h1>
<p class="text-[clamp(16px,4.4vw,20px)] leading-snug font-bold text-on-surface">Track the little things. Remember the big moments.</p>
<p class="text-sm leading-5 text-on-surface-variant">A calm parenting companion for your baby's routines, milestones, and memories.</p>
</div>
</div>
<div class="space-y-2.5 pt-4 shrink-0">
<button class="w-full h-13 min-h-[52px] rounded-full bg-primary text-on-primary font-bold text-base active:scale-[0.98] transition-transform soft-shadow" data-screen-target="login" type="button">Log In</button>
<button class="w-full h-13 min-h-[52px] rounded-full bg-primary-container text-on-primary-container font-bold text-base active:scale-[0.98] transition-transform" data-screen-target="signup" type="button">Create Account</button>
<button class="w-full h-13 min-h-[52px] rounded-full bg-surface-container text-primary font-bold text-base active:scale-[0.98] transition-transform" id="guestButton" type="button">Continue as Guest</button>
<p class="text-center text-xs leading-4 text-on-surface-variant">Guest data is saved only on this device.</p>
</div>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { hasAnyBabyProfileRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { getPendingInviteToken, clearPendingInviteToken, isLoggedIn, loginAsGuest, routeAfterAuth } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { loadInvitePreviewRemote } = await import(`${moduleBase}utils/familyInvitesRemote.mjs`);
  const { bindPrototypeActions, screenUrl, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  if (await isLoggedIn()) {
    const pendingInviteToken = getPendingInviteToken();
    if (await hasUsablePendingInvite(pendingInviteToken)) {
      window.location.replace(`${screenUrl("accept_invite")}?token=${encodeURIComponent(pendingInviteToken)}`);
    } else {
      window.location.replace(routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl));
    }
    await new Promise(() => {});
  }

  bindPrototypeActions();
  document.getElementById("guestButton").addEventListener("click", async () => {
    await loginAsGuest();
    window.location.href = routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl);
  });

  async function hasUsablePendingInvite(token) {
    if (!token) return false;
    try {
      const invite = await loadInvitePreviewRemote(token);
      const status = String(invite?.status || "pending");
      if (!["expired", "revoked", "declined", "accepted"].includes(status)) return true;
    } catch {
      // Stale/broken invite token should not trap normal app entry.
    }
    clearPendingInviteToken();
    return false;
  }
</script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
