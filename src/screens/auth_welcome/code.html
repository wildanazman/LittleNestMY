<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#ffbfa3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LittleNest MY"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/src/utils/pwa-safe-area.css?v=cyan-dark-20260614"/>
<link rel="stylesheet" href="/src/utils/theme.css?v=cyan-dark-20260614"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>
<title>Welcome - LittleNest MY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#83533c",
        "on-primary": "#ffffff",
        "primary-container": "#ffdcc8",
        "on-primary-container": "#321304",
        secondary: "#745b4e",
        "secondary-container": "#ffdcc8",
        tertiary: "#5f6335",
        "tertiary-container": "#e5e9ad",
        surface: "#fff8f5",
        "surface-container": "#f4ebe6",
        "surface-container-low": "#fff1ea",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#211a17",
        "on-surface-variant": "#53433d",
        outline: "#85736b"
      },
      fontFamily: {
        display: ["Nunito Sans", "sans-serif"],
        headline: ["Nunito Sans", "sans-serif"],
        body: ["Nunito Sans", "sans-serif"],
        label: ["Nunito Sans", "sans-serif"]
      }
    }
  }
};
</script>
<style>
body { min-height: 100dvh; }
.soft-shadow { box-shadow: 0 18px 45px rgba(131, 83, 60, 0.12); }
</style>
<script type="module" src="/src/utils/theme.mjs"></script>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<main class="min-h-screen px-6 py-8 flex flex-col justify-between max-w-md mx-auto">
<section class="pt-8 space-y-8">
<div class="flex items-center justify-between">
<div class="w-12 h-12 rounded-2xl bg-primary-container text-on-primary-container flex items-center justify-center soft-shadow">
<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">crib</span>
</div>
<span class="text-sm font-bold text-primary">LittleNest MY</span>
</div>
<div class="rounded-[32px] bg-surface-container-lowest soft-shadow p-6 border border-white/70">
<div class="aspect-[4/3] rounded-[28px] bg-gradient-to-br from-primary-container via-surface-container-low to-tertiary-container flex items-center justify-center mb-7">
<div class="w-28 h-28 rounded-full bg-white/70 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings:'FILL' 1;">family_restroom</span>
</div>
</div>
<div class="space-y-3">
<h1 class="text-[36px] leading-[40px] font-extrabold text-primary">LittleNest MY</h1>
<p class="text-xl leading-7 font-bold text-on-surface">Track the little things. Remember the big moments.</p>
<p class="text-base leading-6 text-on-surface-variant">A calm parenting companion for your baby's routines, milestones, and memories.</p>
</div>
</div>
</section>
<section class="space-y-3 pb-4">
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-bold text-base active:scale-[0.98] transition-transform soft-shadow" data-screen-target="login" type="button">Log In</button>
<button class="w-full h-14 rounded-full bg-primary-container text-on-primary-container font-bold text-base active:scale-[0.98] transition-transform" data-screen-target="signup" type="button">Create Account</button>
<button class="w-full h-14 rounded-full bg-surface-container text-primary font-bold text-base active:scale-[0.98] transition-transform" id="guestButton" type="button">Continue as Guest</button>
<p class="text-center text-xs leading-5 text-on-surface-variant px-8">Guest data is saved only on this device.</p>
</section>
</main>
<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { hasAnyBabyProfileRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { getPendingInviteToken, isLoggedIn, loginAsGuest, routeAfterAuth } = await import(`${moduleBase}utils/localAuth.mjs`);
  const { bindPrototypeActions, screenUrl, showComingSoon } = await import(`${moduleBase}utils/prototypeUi.mjs`);

  if (await isLoggedIn()) {
    const pendingInviteToken = getPendingInviteToken();
    window.location.replace(pendingInviteToken
      ? `${screenUrl("accept_invite")}?token=${encodeURIComponent(pendingInviteToken)}`
      : routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl));
    await new Promise(() => {});
  }

  bindPrototypeActions();
  document.getElementById("guestButton").addEventListener("click", async () => {
    await loginAsGuest();
    window.location.href = routeAfterAuth(await hasAnyBabyProfileRemote(babyProfile), screenUrl);
  });
</script>
<script type="module">
  if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  }
</script>
</body></html>
