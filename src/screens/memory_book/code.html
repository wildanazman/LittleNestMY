<body class="text-on-surface pb-32">

</button>

</div>
<button id="memAddTop" class="flex items-center gap-2 bg-primary-container text-on-primary-container px-4 py-2 rounded-full font-label-md text-label-md active:scale-95 transition-all soft-shadow" type="button">

</button>
</header>
<main class="mt-20 px-container-padding max-w-screen-md mx-auto pb-10">

</div>

<div class="w-16 h-16 rounded-full bg-primary-container/50 text-primary mx-auto flex items-center justify-center mb-3"><span class="material-symbols-outlined text-[34px]">photo_library</span></div>

<span class="font-label-sm text-[10px]">Assistant</span>

<script type="module">
  const moduleBase = window.location.protocol === "file:" ? "../../" : "/src/";
  const { babyProfile } = await import(`${moduleBase}data/mockData.mjs`);
  const { loadBabyProfilesRemote } = await import(`${moduleBase}utils/babyProfilesRemote.mjs`);
  const { loadMilestonesRemote } = await import(`${moduleBase}utils/milestonesRemote.mjs`);
  const { goBackOrTo, goToScreen } = await import(`${moduleBase}utils/prototypeUi.mjs`);
  document.getElementById("memBack").addEventListener("click", () => goBackOrTo("home_dashboard"));
  const goAdd = () => goToScreen("milestones");
  document.getElementById("memAddTop").addEventListener("click", goAdd);

  const babyState = await loadBabyProfilesRemote(babyProfile);
  const selectedBabyId = babyState.selectedBabyId;
  const babyName = (babyState.selectedBaby && babyState.selectedBaby.name) || "Baby";
  document.getElementById("memTitle").textContent = `${babyName}'s memories`;

  let memories = [];
  if (selectedBabyId) {
    try {
      const loaded = await loadMilestonesRemote(selectedBabyId, []);
      memories = (loaded.milestones || []).slice().sort((a, b) => new Date(b.achievedAt || 0) - new Date(a.achievedAt || 0));
    } catch (e) { memories = []; }
  }
  render();
  window.dispatchEvent(new Event("littlenest:ready"));

  function render() {
    const grid = document.getElementById("memGrid");
    const empty = document.getElementById("memEmpty");
    document.getElementById("memCount").textContent = memories.length ? `${memories.length} ${memories.length === 1 ? "memory" : "memories"}` : "";
    if (!memories.length) { empty.classList.remove("hidden"); grid.innerHTML = ""; const add = document.getElementById("memAdd"); if (add) add.addEventListener("click", goAdd); return; }
    empty.classList.add("hidden");
    grid.innerHTML = memories.map(renderCard).join("");
    grid.querySelectorAll("[data-share]").forEach((b) => b.addEventListener("click", () => shareMemory(memories.find((m) => m.id === b.dataset.share))));
  }

  function renderCard(m) {
    const media = m.photoUrl ? renderMedia(m.photoUrl) : `<div class="w-full aspect-square rounded-xl bg-gradient-to-br from-primary-container/60 to-tertiary-container/50 flex items-center justify-center"><span class="material-symbols-outlined text-[40px] text-primary">favorite</span></div>`;
    const noteHtml = m.notes ? `<p class="text-[12px] text-on-surface-variant px-1 mt-0.5 truncate">${escapeHtml(m.notes)}</p>` : "";
    return `<div class="bg-white rounded-2xl p-2 soft-shadow flex flex-col">${media}<p class="font-label-md text-label-md text-on-surface mt-2 px-1 truncate">${escapeHtml(m.title || "Memory")}</p><p class="text-[11px] text-on-surface-variant px-1">${m.achievedAt ? fmt(m.achievedAt) : ""}</p>${noteHtml}<button data-share="${escapeHtml(m.id)}" class="mt-2 mx-1 mb-1 h-9 rounded-full bg-surface-container text-primary text-[13px] font-bold inline-flex items-center justify-center gap-1.5 active:scale-95" type="button"><span class="material-symbols-outlined text-[16px]">ios_share</span>Share</button></div>`;
  }

  function renderMedia(url) {
    const isVideo = /^data:video|\.(mp4|webm|mov)(\?|$)/i.test(url);
    return isVideo
      ? `<video src="${escapeHtml(url)}" class="w-full aspect-square object-cover rounded-xl bg-black" muted loop playsinline></video>`
      : `<img src="${escapeHtml(url)}" class="w-full aspect-square object-cover rounded-xl" alt="Memory"/>`;
  }

  async function shareMemory(m) {
    if (!m) return;
    const text = `${babyName} — ${m.title || "Memory"}${m.notes ? `\n${m.notes}` : ""}\nvia LittleNest MY`;
    try {
      if (m.photoUrl && m.photoUrl.indexOf("http") === 0 && navigator.canShare) {
        try {
          const blob = await (await fetch(m.photoUrl)).blob();
          const file = new File([blob], "memory." + ((blob.type.split("/")[1]) || "jpg"), { type: blob.type || "image/jpeg" });
          if (navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: m.title || "Memory", text }); return; }
        } catch (e) {}
      }
      if (navigator.share) { await navigator.share({ title: m.title || "Memory", text }); return; }
      await navigator.clipboard.writeText(text);
      alert("Memory copied to clipboard.");
    } catch (e) {}
  }

  function fmt(v) { const d = new Date(v); return isNaN(d.getTime()) ? "" : d.toLocaleDateString("en-MY", { day: "numeric", month: "short", year: "numeric" }); }
  function escapeHtml(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
</script>
